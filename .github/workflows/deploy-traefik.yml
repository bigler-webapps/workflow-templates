name: Deploy Infrastructure

on:
  workflow_call:
    inputs:
      target:
        description: 'Inventory target / GitHub environment name'
        required: true
        type: string
      environment:
        description: 'Target environment (production / staging)'
        required: false
        type: string
        default: 'production'

  workflow_dispatch:
    inputs:
      target:
        description: 'GitHub environment / inventory target'
        required: true
        type: environment
      environment:
        description: 'Target Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: Validate target SSH secrets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          required_vars=(SSH_HOST SSH_USER SSH_PRIVATE_KEY)
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "❌ Missing required secret '${var_name}' for environment '${{ inputs.target }}'."
              exit 1
            fi
          done

      - name: 🔑 Write SSH Key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_sync
          chmod 600 ~/.ssh/id_sync

      - name: ⚙️ Add Known Hosts
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Determine Target Environment
        run: |
          TARGET_ENV="${{ inputs.environment }}"
          if [ -z "$TARGET_ENV" ]; then
            TARGET_ENV="production"
          fi
          echo "TARGET_ENV=$TARGET_ENV" >> $GITHUB_ENV
          echo "REMOTE_PATH=/srv/infrastructure/webapp-management" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install PyYAML
          pip install "django-core-micha>=1.2.3"

      - name: Generate .env
        env:
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
        run: |
          generate-env --env ${{ env.TARGET_ENV }} --config project.yaml

      - name: 📂 Rsync project to server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          rsync -rlvz \
            --delete --delete-delay \
            --partial --delay-updates \
            --no-owner --no-group --no-perms --omit-dir-times \
            --chmod=Du=rwx,Dg=rwx,Do=rx,Fu=rw,Fg=rw,Fo=r \
            --rsync-path="mkdir -p ${{ env.REMOTE_PATH }} && rsync" \
            -e "ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'acme.json' \
            --exclude 'uptime-kuma-data' \
            --exclude 'certs-export' \
            --exclude 'backup' \
            --exclude 'wireguard' \
            ./ ${SSH_USER}@${SSH_HOST}:${{ env.REMOTE_PATH }}

      - name: Start containers
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes "${SSH_USER}@${SSH_HOST}" 'bash -s' <<'EOF'
          set -euo pipefail
          cd ${{ env.REMOTE_PATH }}

          if [ ! -f .env ]; then echo "❌ .env missing"; exit 1; fi

          DOCKER="docker"
          if ! docker info >/dev/null 2>&1; then
            DOCKER="sudo -n docker"
          fi

          if [ ! -f acme.json ]; then touch acme.json; chmod 600 acme.json; fi
          $DOCKER network inspect traefik_proxy >/dev/null 2>&1 || $DOCKER network create traefik_proxy

          echo "🚀 Starting stack..."
          $DOCKER compose --env-file .env up -d --remove-orphans
          EOF
