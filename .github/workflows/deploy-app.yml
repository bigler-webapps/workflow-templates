name: Deploy App (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        default: 'staging'
        description: 'Environment to deploy to (staging or production)'
      provision_file_secrets:
        required: false
        type: boolean
        default: false
        description: 'Whether optional file secrets should be provisioned on the target server'
      file_secret_target_subdir:
        required: false
        type: string
        default: '.ssh'
        description: 'Target subdirectory under REMOTE_PATH for optional file secrets'
      file_secret_1_name:
        required: false
        type: string
        default: ''
        description: 'Target filename for optional file secret 1'
      file_secret_1_mode:
        required: false
        type: string
        default: '600'
        description: 'File mode for optional file secret 1'
      file_secret_2_name:
        required: false
        type: string
        default: ''
        description: 'Target filename for optional file secret 2'
      file_secret_2_mode:
        required: false
        type: string
        default: '600'
        description: 'File mode for optional file secret 2'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      OPTIONAL_FILE_SECRET_1_CONTENT: ${{ secrets.OPTIONAL_FILE_SECRET_1_CONTENT }}
      OPTIONAL_FILE_SECRET_2_CONTENT: ${{ secrets.OPTIONAL_FILE_SECRET_2_CONTENT }}
    steps:
      # ---------------------------------------------------------
      # SETUP: Checkouts & Dependencies
      # ---------------------------------------------------------
      - name: ⬇️ Checkout app repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Tooling
        run: |
          # Wir benötigen eine aktuelle Version für den JSON-Support
          pip install "django-core-micha>=1.2.0" PyYAML

      # ---------------------------------------------------------
      # STEP 1: Determine Environment & Dynamic Path
      # ---------------------------------------------------------
      - name: 🧮 Calculate Configuration
        id: config
        run: |
          python3 -c "
          import os, yaml

          # 1. Determine Target Environment
          # Da wir in einem 'workflow_call' sind, kommt das Input immer rein
          target_env = '${{ inputs.environment }}'

          # 2. Read project.yaml to get the base name
          try:
              with open('project.yaml') as f:
                  config = yaml.safe_load(f)
              project_name = config['project_name']
          except FileNotFoundError:
              print('❌ Error: project.yaml not found!')
              exit(1)

          # 3. Calculate Remote Path
          # Staging bekommt den Suffix '_stage', Production bleibt sauber
          suffix = '_stage' if target_env == 'staging' else ''
          remote_path = f'/srv/apps/{project_name}{suffix}'

          print(f'✅ Environment: {target_env}')
          print(f'✅ Project:     {project_name}')
          print(f'✅ Remote Path: {remote_path}')

          # 4. Write to GitHub Env for next steps
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'TARGET_ENV={target_env}\n')
              f.write(f'REMOTE_PATH={remote_path}\n')
              f.write(f'PROJECT_NAME={project_name}\n')
          "

      # ---------------------------------------------------------
      # STEP 2: Generate .env
      # ---------------------------------------------------------
      - name: 🔐 Generate .env file
        env:
          # Wir übergeben ALLE Secrets als JSON-String.
          # Dein Skript 'generate-env' muss os.environ['SECRETS_CONTEXT'] parsen.
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
        run: |
          echo "Generating .env for env: ${{ env.TARGET_ENV }}"
          generate-env --env ${{ env.TARGET_ENV }}

      # ---------------------------------------------------------
      # STEP 3: Rsync to Server
      # ---------------------------------------------------------
      - name: 🚀 Rsync project to server
        uses: burnett01/rsync-deployments@v8
        with:
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key:  ${{ secrets.SSH_PRIVATE_KEY }}
          switches: >-
            -rlvz
            --delete --delete-delay
            --partial --delay-updates
            --no-owner --no-group --no-perms --omit-dir-times
            --chmod=Du=rwx,Dg=rwx,Do=rx,Fu=rw,Fg=rw,Fo=r
            --rsync-path="mkdir -p ${{ env.REMOTE_PATH }} && rsync"
            --exclude=certbot/letsencrypt
            --exclude=docker-compose.override.yml
            --exclude=.git
            --exclude=.github
            --exclude=frontend/node_modules
            --exclude=frontend/build
            --exclude=frontend/build_current
            --exclude=backend/media
            --exclude='**/__pycache__/'
            --exclude=*.pyc
            --exclude='model/.$*.drawio.dtmp'
            --exclude='model/.$*.drawio.bkp'
            --exclude=backups
          path: "./"
          remote_path: ${{ env.REMOTE_PATH }}

      # ---------------------------------------------------------
      # STEP 4: Optional file secret provisioning
      # ---------------------------------------------------------
      - name: 🔐 Provision optional file secrets
        if: ${{ inputs.provision_file_secrets && ((env.OPTIONAL_FILE_SECRET_1_CONTENT != '' && inputs.file_secret_1_name != '') || (env.OPTIONAL_FILE_SECRET_2_CONTENT != '' && inputs.file_secret_2_name != '')) }}
        uses: appleboy/ssh-action@v0.1.10
        env:
          OPTIONAL_FILE_SECRET_1_CONTENT: ${{ env.OPTIONAL_FILE_SECRET_1_CONTENT }}
          OPTIONAL_FILE_SECRET_2_CONTENT: ${{ env.OPTIONAL_FILE_SECRET_2_CONTENT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: OPTIONAL_FILE_SECRET_1_CONTENT,OPTIONAL_FILE_SECRET_2_CONTENT
          script: |
            set -euo pipefail
            TARGET_DIR="${{ env.REMOTE_PATH }}/${{ inputs.file_secret_target_subdir }}"

            mkdir -p "$TARGET_DIR"
            chmod 700 "$TARGET_DIR"

            if [ -n "${OPTIONAL_FILE_SECRET_1_CONTENT:-}" ] && [ -n "${{ inputs.file_secret_1_name }}" ]; then
              printf '%s\n' "$OPTIONAL_FILE_SECRET_1_CONTENT" | tr -d '\r' > "$TARGET_DIR/${{ inputs.file_secret_1_name }}"
              chmod "${{ inputs.file_secret_1_mode }}" "$TARGET_DIR/${{ inputs.file_secret_1_name }}"
            fi

            if [ -n "${OPTIONAL_FILE_SECRET_2_CONTENT:-}" ] && [ -n "${{ inputs.file_secret_2_name }}" ]; then
              printf '%s\n' "$OPTIONAL_FILE_SECRET_2_CONTENT" | tr -d '\r' > "$TARGET_DIR/${{ inputs.file_secret_2_name }}"
              chmod "${{ inputs.file_secret_2_mode }}" "$TARGET_DIR/${{ inputs.file_secret_2_name }}"
            fi

      # ---------------------------------------------------------
      # STEP 5: Docker Start & Migrate
      # ---------------------------------------------------------
      - name: 🐳 Build, Restart & Migrate (Force Recreate)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd ${{ env.REMOTE_PATH }}

            # 1. Docker Berechtigung prüfen
            DOCKER="docker"
            if ! docker info >/dev/null 2>&1; then
              DOCKER="sudo -n docker"
            fi
            
            # 2. Setup
            export DOCKER_BUILDKIT=1
            COMPOSE_FILES="-f docker-compose.yml"

            echo "🚀 Starting Deployment..."

            # 3. Cleanup (Platz schaffen)
            $DOCKER image prune -f

            # 4. Build & Force Start
            echo "🔥 Recreating containers..."
            $DOCKER compose $COMPOSE_FILES --env-file .env up -d --build --force-recreate --remove-orphans

            # 5. Warten (Sicherheitspuffer)
            echo "⏳ Waiting for backend to initialize..."
            sleep 3

            # 6. Datenbank Migration
            echo "🔄 Running migrations..."
            $DOCKER compose $COMPOSE_FILES --env-file .env exec -T backend python manage.py migrate --noinput
            
            # Optional: Cache leeren (falls nötig)
            # $DOCKER compose $COMPOSE_FILES --env-file .env exec -T backend python manage.py clear_cache

            echo "✅ Deployment finished successfully!"
