name: Show VPN QR Code

on:
  workflow_call:
    inputs:
      target:
        description: 'GitHub environment / inventory target with vpn role'
        required: true
        type: string
      peer_name:
        description: 'Peer name (as defined in PEERS)'
        required: true
        type: string

  workflow_dispatch:
    inputs:
      target:
        description: 'GitHub environment / inventory target with vpn role'
        required: true
        type: environment
      peer_name:
        description: 'Name des Peers (wie in PEERS definiert)'
        required: true
        default: 'michaphone'

jobs:
  prepare_targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: 🧮 Resolve VPN target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          MATRIX="$(python3 .github/scripts/resolve_inventory_targets.py --target "${{ inputs.target }}" --require-role vpn)"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  show_qr:
    needs: prepare_targets
    strategy:
      matrix: ${{ fromJson(needs.prepare_targets.outputs.matrix) }}
    runs-on: ubuntu-latest
    environment: ${{ matrix.github_environment }}
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Trust server host key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Retrieve QR Code
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" \
            "docker exec wireguard /app/show-peer ${{ inputs.peer_name }}"
