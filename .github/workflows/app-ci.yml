name: App CI

on:
  workflow_call:
    inputs:
      # Backend
      dockerfile:
        type: string
        default: 'backend/Dockerfile'
      build-context:
        type: string
        default: '.'
      db-image:
        type: string
        default: 'postgis/postgis:14-3.1'
      django-settings-module:
        type: string
        default: 'backend.test_settings'
      pytest-args:
        type: string
        default: ''
      run-backend:
        type: boolean
        # Temporarily disabled by default to save GH Actions minutes. Callers
        # that want backend CI must opt in with `run-backend: true`. Flip back
        # to true when budget allows.
        default: false
      # Frontend
      node-version:
        type: string
        default: '24'
      pnpm-version:
        type: string
        default: '10.11.0'
      frontend-path:
        type: string
        default: 'frontend'
      run-frontend-lint:
        type: boolean
        default: true
      run-frontend-tests:
        type: boolean
        # Temporarily disabled by default to save GH Actions minutes. Lint
        # stays on. Callers that want test runs must opt in with
        # `run-frontend-tests: true`. Flip back to true when budget allows.
        default: false
      runs-on:
        description: >
          Runner label. Use 'ubuntu-latest' for GitHub-hosted runners (default).
          For the self-hosted Netcup pool pass a single unique label (e.g. 'netcup').
          Multi-label JSON arrays are not supported by this input.
        type: string
        default: 'ubuntu-latest'
    secrets:
      VITE_APP_MUI_LICENSE_KEY:
        required: false

jobs:
  backend:
    if: ${{ inputs.run-backend }}
    runs-on: ${{ inputs.runs-on }}
    services:
      postgres:
        image: ${{ inputs.db-image }}
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Build backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6.19.2
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile }}
          load: true
          tags: ci-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_APP_MUI_LICENSE_KEY=${{ secrets.VITE_APP_MUI_LICENSE_KEY }}

      - name: Run pytest
        run: |
          docker run --rm --network host \
            -e DJANGO_SETTINGS_MODULE='${{ inputs.django-settings-module }}' \
            -e DJANGO_SECRET_KEY='ci-dummy-secret' \
            -e DJANGO_ALLOWED_HOSTS='localhost,127.0.0.1' \
            -e DEBUG='False' \
            -e ENV_TYPE='local' \
            -e TEST_DB_HOST='localhost' \
            -e DB_HOST='localhost' \
            -e DB_PORT='5432' \
            -e DB_NAME='test' \
            -e DB_USER='test' \
            -e DB_PASSWORD='test' \
            -e EMAIL_PORT='25' \
            -e EMAIL_USE_TLS='False' \
            ci-backend:test \
            pytest ${{ inputs.pytest-args }}

  frontend:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4.4.0
        with:
          version: ${{ inputs.pnpm-version }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
          cache-dependency-path: ${{ inputs.frontend-path }}/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: ${{ inputs.frontend-path }}
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: ${{ inputs.run-frontend-lint }}
        working-directory: ${{ inputs.frontend-path }}
        run: pnpm lint

      - name: Test
        if: ${{ inputs.run-frontend-tests }}
        working-directory: ${{ inputs.frontend-path }}
        run: pnpm test
