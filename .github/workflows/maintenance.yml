name: Maintenance - Reboot If Needed

on:
  workflow_call:
    inputs:
      target:
        description: 'GitHub environment / inventory target'
        required: false
        type: string
      apply_updates:
        required: false
        type: boolean
        default: true
      force_reboot:
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      target:
        description: "GitHub environment / inventory target for manual runs"
        required: true
        type: environment
      apply_updates:
        description: "Install apt updates before reboot decision"
        required: false
        default: true
        type: boolean
      force_reboot:
        description: "Force reboot even if /var/run/reboot-required is absent"
        required: false
        default: false
        type: boolean

concurrency:
  group: maintenance-reboot
  cancel-in-progress: false

jobs:
  prepare_targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: 🧮 Resolve maintenance targets
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.target }}" ]; then
            MATRIX="$(python3 .github/scripts/resolve_inventory_targets.py --target "${{ inputs.target }}" --require-role maintenance)"
          else
            MATRIX="$(python3 .github/scripts/resolve_inventory_targets.py --role maintenance)"
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  reboot-if-needed:
    needs: prepare_targets
    strategy:
      matrix: ${{ fromJson(needs.prepare_targets.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ matrix.github_environment }}
    steps:
      - name: Validate target SSH secrets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          required_vars=(SSH_HOST SSH_USER SSH_PRIVATE_KEY)
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "❌ Missing required secret '${var_name}' for environment '${{ matrix.github_environment }}'."
              exit 1
            fi
          done

      - name: Write normalized SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_sync
          chmod 600 ~/.ssh/id_sync

      - name: Trust server host key
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Install system updates
        id: updates
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.apply_updates }}
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" 'bash -s' << "EOF"
          set -euo pipefail

          SUDO=""
          if [ "$(id -u)" -ne 0 ]; then
            SUDO="sudo -n"
          fi

          echo "Refreshing apt index..."
          $SUDO apt-get update -y

          BEFORE_COUNT="$($SUDO apt list --upgradable 2>/dev/null | tail -n +2 | wc -l || true)"
          echo "Upgradable packages before upgrade: ${BEFORE_COUNT}"

          if [ "${BEFORE_COUNT}" -gt 0 ]; then
            echo "Installing upgrades..."
            $SUDO env DEBIAN_FRONTEND=noninteractive apt-get -y upgrade
            $SUDO env DEBIAN_FRONTEND=noninteractive apt-get -y autoremove
            $SUDO apt-get -y autoclean
          else
            echo "No package upgrades required."
          fi

          AFTER_COUNT="$($SUDO apt list --upgradable 2>/dev/null | tail -n +2 | wc -l || true)"
          echo "Upgradable packages after upgrade: ${AFTER_COUNT}"

          if [ -f /var/run/reboot-required ]; then
            echo "reboot_required=yes"
          else
            echo "reboot_required=no"
          fi
          EOF

      - name: Decide whether reboot is needed
        id: decision
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail

          FORCE_REBOOT="${{ github.event_name == 'workflow_dispatch' && inputs.force_reboot || false }}"
          NEED_REBOOT="no"
          REASON="none"

          if [ "$FORCE_REBOOT" = "true" ]; then
            NEED_REBOOT="yes"
            REASON="forced"
          elif ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "test -f /var/run/reboot-required"; then
            NEED_REBOOT="yes"
            REASON="reboot-required"
          fi

          echo "need_reboot=$NEED_REBOOT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          echo "Decision: need_reboot=$NEED_REBOOT (reason=$REASON)"
          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "uname -a; uptime"

      - name: Skip reboot
        if: steps.decision.outputs.need_reboot != 'yes'
        run: echo "No reboot required. Finishing maintenance run."

      - name: Trigger reboot
        if: steps.decision.outputs.need_reboot == 'yes'
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "sudo -n systemctl reboot || sudo -n reboot || reboot" || true
          echo "Reboot command sent."

      - name: Wait for host to come back
        if: steps.decision.outputs.need_reboot == 'yes'
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          echo "Waiting for SSH to become reachable again..."
          sleep 15

          for i in $(seq 1 60); do
            if ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes -o ConnectTimeout=5 "${SSH_USER}@${SSH_HOST}" "echo online" >/dev/null 2>&1; then
              echo "Host is reachable again."
              exit 0
            fi
            sleep 10
          done

          echo "::error::Host did not come back within timeout."
          exit 1

      - name: Post-check containers
        if: steps.decision.outputs.need_reboot == 'yes'
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          EXPECTED_CONTAINER_TOKENS_JSON: ${{ toJson(matrix.expected_container_tokens) }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "uptime"
          echo

          echo "Running containers:"
          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" 'docker ps --format "table {{.Names}}\t{{.Status}}"'
          echo

          CONTAINER_NAMES="$(ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" 'docker ps --format "{{.Names}}"')"
          export CONTAINER_NAMES

          python3 - <<'PYCODE'
          import json
          import os

          names = os.environ.get("CONTAINER_NAMES", "").splitlines()
          expected = json.loads(os.environ.get("EXPECTED_CONTAINER_TOKENS_JSON", "[]"))
          missing = [token for token in expected if not any(token in name for name in names)]
          if missing:
              print("Missing expected container token(s):", ", ".join(missing))
              raise SystemExit(1)

          print("All expected app/infrastructure container groups are present.")
          PYCODE
