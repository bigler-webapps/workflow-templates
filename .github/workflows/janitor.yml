name: Janitor (maintenance)

on:
  workflow_call:
    inputs:
      target:
        description: 'GitHub environment / inventory target'
        required: true
        type: string

  workflow_dispatch:
    inputs:
      target:
        description: "GitHub environment / inventory target for manual runs"
        required: true
        type: environment

jobs:
  prepare_targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: 🧮 Resolve janitor targets
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -z "${{ inputs.target }}" ]; then
              echo "❌ 'target' is required for manual janitor runs."
              exit 1
            fi
            MATRIX="$(python3 .github/scripts/resolve_inventory_targets.py --target "${{ inputs.target }}" --require-role janitor)"
          else
            MATRIX="$(python3 .github/scripts/resolve_inventory_targets.py --role janitor)"
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  janitor:
    needs: prepare_targets
    strategy:
      matrix: ${{ fromJson(needs.prepare_targets.outputs.matrix) }}
    runs-on: ubuntu-latest
    environment: ${{ matrix.github_environment }}
    steps:
      - uses: actions/checkout@v4

      - name: ⬇️ Checkout webapp-ops-scripts
        uses: actions/checkout@v4
        with:
          repository: bigler-webapps/webapp-ops-scripts
          path: ops-scripts

      - name: Validate target SSH secrets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          required_vars=(SSH_HOST SSH_USER SSH_PRIVATE_KEY)
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "❌ Missing required secret '${var_name}' for environment '${{ matrix.github_environment }}'."
              exit 1
            fi
          done

      - name: Write normalized SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_sync
          chmod 600 ~/.ssh/id_sync

      - name: Trust server host key
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: 📂 Sync Ops Scripts to Server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          rsync -avz -e "ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes" \
            ops-scripts/ \
            ${SSH_USER}@${SSH_HOST}:/srv/infrastructure/ops-scripts/

      - name: Run janitor on server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes "${SSH_USER}@${SSH_HOST}" \
            'bash /srv/infrastructure/ops-scripts/janitor.sh'
