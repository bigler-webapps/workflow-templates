name: Backup, Verify & Sync

on:
  workflow_call:
    inputs:
      target:
        description: 'GitHub environment / inventory target (empty = all backup targets)'
        required: false
        type: string
      sync_staging:
        description: 'Also sync data to staging?'
        required: false
        type: boolean
        default: true

  workflow_dispatch:
    inputs:
      target:
        description: 'GitHub environment / inventory target for manual runs'
        required: true
        type: environment
      sync_staging:
        description: 'Auch Daten auf Staging überschreiben?'
        required: true
        type: boolean
        default: true

jobs:
  prepare_targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: 🧮 Resolve backup targets
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ -n "${{ inputs.target }}" ]; then
            if [ -z "${{ inputs.target }}" ]; then
              echo "❌ 'target' is required for manual backup runs."
              exit 1
            fi
            MATRIX="$(python3 .github/scripts/resolve_inventory_targets.py --target "${{ inputs.target }}" --require-role backup)"
          else
            MATRIX="$(python3 .github/scripts/resolve_inventory_targets.py --role backup)"
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  full-backup-cycle:
    needs: prepare_targets
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_targets.outputs.matrix) }}
    runs-on: ubuntu-latest
    environment: ${{ matrix.github_environment }}

    steps:
      # ---------------------------------------------------------
      # 1. Check out calling infra repo + ops scripts
      # ---------------------------------------------------------
      - name: ⬇️ Checkout infra repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: ⬇️ Checkout webapp-ops-scripts
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: bigler-webapps/webapp-ops-scripts
          path: ops-scripts

      - name: 📋 Bundle infra paths with ops scripts
        shell: bash
        run: |
          set -euo pipefail
          if [ -f backup/infra_paths.txt ]; then
            cp backup/infra_paths.txt ops-scripts/infra_paths.txt
          else
            touch ops-scripts/infra_paths.txt
          fi

      - name: Validate target backup secrets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          RESTIC_REPO_B2: ${{ secrets.RESTIC_REPO_B2 }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
        run: |
          set -euo pipefail

          required_vars=(SSH_HOST SSH_USER SSH_PRIVATE_KEY RESTIC_REPO_B2 RESTIC_PASSWORD B2_KEY_ID B2_APP_KEY)
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "❌ Missing required secret '${var_name}' for environment '${{ matrix.github_environment }}'."
              exit 1
            fi
          done

      - name: 🔑 Write normalized SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_sync
          chmod 600 ~/.ssh/id_sync

      - name: ⚙️ Add known host
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      # ---------------------------------------------------------
      # 2. Push ops scripts to server
      # ---------------------------------------------------------
      - name: 📂 Sync Ops Scripts to Server
        id: sync_scripts
        continue-on-error: true
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          rsync -avz -e "ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes" \
            ops-scripts/ \
            ${SSH_USER}@${SSH_HOST}:/srv/infrastructure/ops-scripts/

      # ---------------------------------------------------------
      # 3. Backup
      # ---------------------------------------------------------
      - name: 💾 Run Backup
        id: run_backup
        if: steps.sync_scripts.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          RESTIC_REPO_LOCAL: /srv/backups/restic_v2
          RESTIC_REPO_B2: ${{ secrets.RESTIC_REPO_B2 }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes "${SSH_USER}@${SSH_HOST}" \
            "RESTIC_REPO_LOCAL=$(printf '%q' "$RESTIC_REPO_LOCAL") \
             RESTIC_REPO_B2=$(printf '%q' "$RESTIC_REPO_B2") \
             RESTIC_PASSWORD=$(printf '%q' "$RESTIC_PASSWORD") \
             AWS_ACCESS_KEY_ID=$(printf '%q' "$AWS_ACCESS_KEY_ID") \
             AWS_SECRET_ACCESS_KEY=$(printf '%q' "$AWS_SECRET_ACCESS_KEY") \
             PYTHONUNBUFFERED=$(printf '%q' "$PYTHONUNBUFFERED") \
             bash -s" <<'EOF'
          set -euo pipefail
          python3 /srv/infrastructure/ops-scripts/backup.py
          EOF

      # ---------------------------------------------------------
      # 4. Verify
      # ---------------------------------------------------------
      - name: 🔍 Verify Backup (Smoke Test)
        id: verify_backup
        if: steps.run_backup.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          RESTIC_REPO_B2: ${{ secrets.RESTIC_REPO_B2 }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes "${SSH_USER}@${SSH_HOST}" \
            "RESTIC_REPO_B2=$(printf '%q' "$RESTIC_REPO_B2") \
             RESTIC_PASSWORD=$(printf '%q' "$RESTIC_PASSWORD") \
             B2_KEY_ID=$(printf '%q' "$B2_KEY_ID") \
             B2_APP_KEY=$(printf '%q' "$B2_APP_KEY") \
             PYTHONUNBUFFERED=$(printf '%q' "$PYTHONUNBUFFERED") \
             bash -s" <<'EOF'
          set -euo pipefail
          export AWS_ACCESS_KEY_ID="$B2_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$B2_APP_KEY"
          python3 /srv/infrastructure/ops-scripts/verify_backup.py
          EOF

      # ---------------------------------------------------------
      # 5. Sync to Staging (Optional / Conditional)
      # ---------------------------------------------------------
      - name: 🔄 Sync Production Data to Staging
        id: sync_staging
        if: steps.verify_backup.outcome == 'success' && (github.event_name == 'schedule' || github.event.inputs.sync_staging == 'true' || inputs.sync_staging == true)
        continue-on-error: true
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          RESTIC_REPOSITORY: ${{ secrets.RESTIC_REPO_B2 }}
          RESTIC_PASSWORD: ${{ secrets.RESTIC_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_APP_KEY }}
          SYNC_STAGING_APPS_JSON: ${{ toJson(matrix.sync_staging_apps) }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes "${SSH_USER}@${SSH_HOST}" \
            "RESTIC_REPOSITORY=$(printf '%q' "$RESTIC_REPOSITORY") \
             RESTIC_PASSWORD=$(printf '%q' "$RESTIC_PASSWORD") \
             AWS_ACCESS_KEY_ID=$(printf '%q' "$AWS_ACCESS_KEY_ID") \
             AWS_SECRET_ACCESS_KEY=$(printf '%q' "$AWS_SECRET_ACCESS_KEY") \
             SYNC_STAGING_APPS_JSON=$(printf '%q' "$SYNC_STAGING_APPS_JSON") \
             PYTHONUNBUFFERED=$(printf '%q' "$PYTHONUNBUFFERED") \
             bash -s" <<'EOF'
          set -euo pipefail

          python3 - <<'PYCODE'
          import json
          import os
          import subprocess
          import sys

          apps = json.loads(os.environ.get("SYNC_STAGING_APPS_JSON", "[]"))
          if not apps:
              print("ℹ️ No staging sync apps configured for this target. Skipping.")
              raise SystemExit(0)

          print("=== STARTING SYNC TO STAGING ===")
          failures = []
          for app in apps:
              print(f"🔄 Processing {app}...")
              result = subprocess.run(
                  [
                      "python3",
                      "/srv/infrastructure/ops-scripts/restore.py",
                      "--app",
                      app,
                      "--target-env",
                      "staging",
                      "--snapshot",
                      "latest",
                  ],
                  check=False,
              )
              if result.returncode == 0:
                  print(f"✅ Restore succeeded for {app}.")
                  continue

              print(f"❌ Restore failed for {app} with exit code {result.returncode}.")
              failures.append((app, result.returncode))

          print("=== SYNC SUMMARY ===")
          for app in apps:
              failed = next((code for failed_app, code in failures if failed_app == app), None)
              if failed is None:
                  print(f"  - {app}: success")
              else:
                  print(f"  - {app}: failure (exit code {failed})")

          if failures:
              print("=== SYNC COMPLETED WITH FAILURES ===")
              raise SystemExit(1)

          print("=== SYNC COMPLETED SUCCESSFULLY ===")
          PYCODE
          EOF

      - name: 🧾 Summarize Target Result
        if: always()
        shell: bash
        env:
          TARGET_NAME: ${{ matrix.target }}
          TARGET_ENVIRONMENT: ${{ matrix.github_environment }}
          SYNC_SCRIPTS_OUTCOME: ${{ steps.sync_scripts.outcome }}
          RUN_BACKUP_OUTCOME: ${{ steps.run_backup.outcome }}
          VERIFY_BACKUP_OUTCOME: ${{ steps.verify_backup.outcome }}
          SYNC_STAGING_OUTCOME: ${{ steps.sync_staging.outcome }}
        run: |
          set -euo pipefail

          final_status="success"
          if [ "$SYNC_SCRIPTS_OUTCOME" = "failure" ] || \
             [ "$RUN_BACKUP_OUTCOME" = "failure" ] || \
             [ "$VERIFY_BACKUP_OUTCOME" = "failure" ] || \
             [ "$SYNC_STAGING_OUTCOME" = "failure" ]; then
            final_status="failure"
          fi

          {
            echo "## Backup target: ${TARGET_NAME}"
            echo
            echo "- Environment: \`${TARGET_ENVIRONMENT}\`"
            echo "- Final status: \`${final_status}\`"
            echo "- Sync Scripts: \`${SYNC_SCRIPTS_OUTCOME}\`"
            echo "- Run Backup: \`${RUN_BACKUP_OUTCOME}\`"
            echo "- Verify Backup: \`${VERIFY_BACKUP_OUTCOME}\`"
            echo "- Sync to Staging: \`${SYNC_STAGING_OUTCOME}\`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: 🚨 Fail Target At End If Needed
        if: always()
        shell: bash
        env:
          TARGET_NAME: ${{ matrix.target }}
          SYNC_SCRIPTS_OUTCOME: ${{ steps.sync_scripts.outcome }}
          RUN_BACKUP_OUTCOME: ${{ steps.run_backup.outcome }}
          VERIFY_BACKUP_OUTCOME: ${{ steps.verify_backup.outcome }}
          SYNC_STAGING_OUTCOME: ${{ steps.sync_staging.outcome }}
        run: |
          set -euo pipefail

          if [ "$SYNC_SCRIPTS_OUTCOME" = "failure" ] || \
             [ "$RUN_BACKUP_OUTCOME" = "failure" ] || \
             [ "$VERIFY_BACKUP_OUTCOME" = "failure" ] || \
             [ "$SYNC_STAGING_OUTCOME" = "failure" ]; then
            echo "❌ Backup workflow failed for target ${TARGET_NAME}."
            exit 1
          fi

          echo "✅ Backup workflow completed successfully for target ${TARGET_NAME}."
