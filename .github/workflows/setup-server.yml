name: 🚀 Initial Server Setup (Bootstrap)

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'IP Address of the new server'
        required: true
      deploy_user:
        description: 'Username for deployment'
        required: true
        default: 'deploy'

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ inputs.server_ip }}
          username: root
          # WICHTIG: Hier muss der Key rein, der ROOT-Zugriff hat (z.B. Ihr Laptop-Key)
          # Sie sollten diesen als separates Secret speichern, z.B. SSH_PRIVATE_KEY_ROOT
          key: ${{ secrets.SSH_PRIVATE_KEY_ROOT }} 
          script: |
            set -euo pipefail
            
            DEPLOY_USER="${{ inputs.deploy_user }}"
            echo "🚀 Starting Bootstrap for IP: ${{ inputs.server_ip }}"

            # ---------------------------------------------------------
            # 1. Updates & Tools installieren
            # ---------------------------------------------------------
            echo "📦 Updating System and installing base tools..."
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get upgrade -y
            apt-get install -y curl git ufw fail2ban htop ncdu rsync restic

            # ---------------------------------------------------------
            # 2. Docker installieren (falls nicht vorhanden)
            # ---------------------------------------------------------
            if ! command -v docker &> /dev/null; then
                echo "🐳 Installing Docker..."
                curl -fsSL https://get.docker.com | sh
            else
                echo "✅ Docker already installed."
            fi

            # ---------------------------------------------------------
            # 3. Deploy-User erstellen
            # ---------------------------------------------------------
            if id "$DEPLOY_USER" &>/dev/null; then
                echo "✅ User $DEPLOY_USER already exists."
            else
                echo "bust_in_silhouette Creating user $DEPLOY_USER..."
                adduser --disabled-password --gecos "" $DEPLOY_USER
                usermod -aG docker $DEPLOY_USER
                usermod -aG sudo $DEPLOY_USER
            fi

            # ---------------------------------------------------------
            # 4. SSH-Keys kopieren (Root -> Deploy User)
            # ---------------------------------------------------------
            # Wir kopieren die authorized_keys von root zum deploy user,
            # damit GitHub Actions (und Sie) sich sofort als 'deploy' einloggen können.
            echo "🔑 Setting up SSH keys for $DEPLOY_USER..."
            mkdir -p /home/$DEPLOY_USER/.ssh
            
            # Keys kopieren (überschreibt nicht, hängt an, falls Datei existiert)
            if [ -f /root/.ssh/authorized_keys ]; then
                cat /root/.ssh/authorized_keys >> /home/$DEPLOY_USER/.ssh/authorized_keys
                # Doppelte Einträge entfernen (optionaler Clean-up)
                sort -u /home/$DEPLOY_USER/.ssh/authorized_keys -o /home/$DEPLOY_USER/.ssh/authorized_keys
            fi

            # Rechte korrigieren (GANZ WICHTIG!)
            chown -R $DEPLOY_USER:$DEPLOY_USER /home/$DEPLOY_USER/.ssh
            chmod 700 /home/$DEPLOY_USER/.ssh
            chmod 600 /home/$DEPLOY_USER/.ssh/authorized_keys

            # ---------------------------------------------------------
            # 5. Ordnerstruktur erstellen & Rechte setzen
            # ---------------------------------------------------------
            echo "📂 Creating directory structure..."
            mkdir -p /srv/apps
            mkdir -p /srv/infrastructure/webapp-management
            
            # Alles gehört dem Deploy-User
            chown -R $DEPLOY_USER:$DEPLOY_USER /srv

            # ---------------------------------------------------------
            # 6. UFW Firewall Konfiguration (Docker-friendly)
            # ---------------------------------------------------------
            echo "🔥 Configuring Firewall..."
            
            # 1. Standard-Policies
            ufw default deny incoming
            ufw default allow outgoing
            
            # 2. WICHTIG: Forwarding für Docker erlauben
            # Wir ändern die /etc/default/ufw direkt
            sed -i 's/DEFAULT_FORWARD_POLICY="DROP"/DEFAULT_FORWARD_POLICY="ACCEPT"/' /etc/default/ufw
            
            # 3. Ports öffnen
            ufw allow 22/tcp    # SSH
            ufw allow 80/tcp    # HTTP
            ufw allow 443/tcp   # HTTPS
            # ufw allow 51820/udp # Wireguard (optional, einkommentieren wenn nötig)

            # 4. Firewall aktivieren (ohne Interaktion)
            echo "y" | ufw enable
            
            # Docker neu starten, damit es die Firewall-Regeln mitbekommt
            systemctl restart docker

            # ---------------------------------------------------------
            # 7. Fail2Ban Basic Setup
            # ---------------------------------------------------------
            echo "🛡️ Configuring Fail2Ban..."
            cat <<EOF > /etc/fail2ban/jail.local
            [DEFAULT]
            bantime  = 1h
            findtime = 10m
            maxretry = 5
            # Whitelist Localhost
            ignoreip = 127.0.0.1/8 ::1
            
            [sshd]
            enabled = true
            port    = ssh
            EOF
            
            systemctl restart fail2ban

            echo "✅ Server Setup Complete! You can now deploy apps."
