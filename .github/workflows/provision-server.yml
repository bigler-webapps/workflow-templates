name: Provision Server

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      server_ip:
        required: false
        type: string
      deploy_user:
        required: false
        type: string
      infra_public_key:
        required: false
        type: string
      sync_access_keys:
        required: false
        type: boolean
        default: true

  workflow_dispatch:
    inputs:
      target:
        description: "GitHub environment / inventory target for this server."
        required: true
        type: environment
      server_ip:
        description: "Optional host override. Uses target environment SSH_HOST when empty."
        required: false
        type: string
      deploy_user:
        description: "User that will own app deployments"
        required: false
        type: string
      infra_public_key:
        description: "Optional infrastructure public key written directly to the deploy user."
        required: false
        type: string
      sync_access_keys:
        description: "Sync managed public keys after the base bootstrap finished"
        required: true
        default: true
        type: boolean

jobs:
  validate_inputs:
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Validate workflow inputs
        shell: bash
        env:
          INPUT_TARGET: ${{ inputs.target }}
          INPUT_DEPLOY_USER: ${{ inputs.deploy_user }}
          INPUT_SERVER_IP: ${{ inputs.server_ip }}
          INPUT_INFRA_PUBLIC_KEY: ${{ inputs.infra_public_key }}
        run: |
          set -euo pipefail

          # target: must be a safe environment identifier
          if ! printf '%s' "$INPUT_TARGET" | grep -qE '^[a-zA-Z0-9_-]+$'; then
            echo "❌ Invalid 'target' input — must match [a-zA-Z0-9_-]+"
            exit 1
          fi

          # deploy_user: optional; if set must be a valid POSIX username
          if [ -n "${INPUT_DEPLOY_USER:-}" ]; then
            if ! printf '%s' "$INPUT_DEPLOY_USER" | grep -qE '^[a-z_][a-z0-9_-]{0,31}$'; then
              echo "❌ Invalid 'deploy_user' input — must be a valid POSIX username"
              exit 1
            fi
          fi

          # server_ip: optional; if set must be IPv4/IPv6/hostname (no shell metas)
          if [ -n "${INPUT_SERVER_IP:-}" ]; then
            if ! printf '%s' "$INPUT_SERVER_IP" | grep -qE '^[a-zA-Z0-9._:-]+$'; then
              echo "❌ Invalid 'server_ip' input"
              exit 1
            fi
          fi

          # infra_public_key: optional; if set must be exactly one OpenSSH key on one line
          if [ -n "${INPUT_INFRA_PUBLIC_KEY:-}" ]; then
            line_count=$(printf '%s' "$INPUT_INFRA_PUBLIC_KEY" | wc -l)
            if [ "$line_count" -gt 0 ]; then
              echo "❌ infra_public_key must be a single line (no newlines)"
              exit 1
            fi
            if ! printf '%s' "$INPUT_INFRA_PUBLIC_KEY" | grep -qE '^(ssh-(rsa|ed25519|dss)|ecdsa-sha2-[a-z0-9-]+)[[:space:]]+[A-Za-z0-9+/=]+([[:space:]]+\S+)?$'; then
              echo "❌ infra_public_key does not match expected OpenSSH key format"
              exit 1
            fi
          fi

          echo "✅ Inputs validated."

  prepare_targets:
    needs: validate_inputs
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: 🧮 Resolve inventory target
        id: resolve
        shell: bash
        env:
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          MATRIX="$(python3 .github/scripts/resolve_inventory_targets.py --target "$INPUT_TARGET")"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  bootstrap:
    needs: prepare_targets
    strategy:
      matrix: ${{ fromJson(needs.prepare_targets.outputs.matrix) }}
    environment: ${{ matrix.github_environment }}
    runs-on: ubuntu-latest
    env:
      TARGET_HOST: ${{ inputs.server_ip != '' && inputs.server_ip || secrets.SSH_HOST }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: 🧱 Bootstrap base server and app platform
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262  # v1.0.3
        env:
          INPUT_DEPLOY_USER: ${{ inputs.deploy_user }}
          MATRIX_DEPLOY_USER: ${{ matrix.deploy_user }}
          INPUT_INFRA_PUBLIC_KEY: ${{ inputs.infra_public_key }}
          TARGET_HOST: ${{ env.TARGET_HOST }}
        with:
          host: ${{ env.TARGET_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY_ROOT }}
          envs: INPUT_DEPLOY_USER,MATRIX_DEPLOY_USER,INPUT_INFRA_PUBLIC_KEY,TARGET_HOST
          script: |
            set -euo pipefail

            DEPLOY_USER="${INPUT_DEPLOY_USER}"
            if [ -z "${DEPLOY_USER}" ]; then
              DEPLOY_USER="${MATRIX_DEPLOY_USER}"
            fi

            echo "🚀 Starting provisioning for ${DEPLOY_USER} on ${TARGET_HOST}"

            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get upgrade -y
            apt-get install -y curl git ufw fail2ban htop ncdu rsync acl restic

            if ! command -v docker >/dev/null 2>&1; then
              echo "🐳 Installing Docker..."
              curl -fsSL https://get.docker.com | sh
            else
              echo "✅ Docker already installed."
            fi

            if id "${DEPLOY_USER}" >/dev/null 2>&1; then
              echo "✅ User ${DEPLOY_USER} already exists."
            else
              adduser --disabled-password --gecos "" "${DEPLOY_USER}"
            fi

            usermod -aG docker "${DEPLOY_USER}" || true
            usermod -aG sudo "${DEPLOY_USER}" || true

            cat <<EOF >/etc/sudoers.d/90-webapp-maintenance
            ${DEPLOY_USER} ALL=(ALL) NOPASSWD:SETENV: /usr/bin/apt-get, /usr/bin/apt, /usr/bin/systemctl reboot, /usr/sbin/reboot
            EOF
            chmod 440 /etc/sudoers.d/90-webapp-maintenance
            visudo -cf /etc/sudoers.d/90-webapp-maintenance

            mkdir -p /home/${DEPLOY_USER}/.ssh
            if [ -f /root/.ssh/authorized_keys ]; then
              cat /root/.ssh/authorized_keys >> /home/${DEPLOY_USER}/.ssh/authorized_keys
              sort -u /home/${DEPLOY_USER}/.ssh/authorized_keys -o /home/${DEPLOY_USER}/.ssh/authorized_keys
            fi
            if [ -n "${INPUT_INFRA_PUBLIC_KEY:-}" ]; then
              # Format already validated upstream (validate_inputs job).
              printf '%s\n' "${INPUT_INFRA_PUBLIC_KEY}" >> /home/${DEPLOY_USER}/.ssh/authorized_keys
              sort -u /home/${DEPLOY_USER}/.ssh/authorized_keys -o /home/${DEPLOY_USER}/.ssh/authorized_keys
            fi
            chown -R "${DEPLOY_USER}:${DEPLOY_USER}" /home/${DEPLOY_USER}/.ssh
            chmod 700 /home/${DEPLOY_USER}/.ssh
            [ -f /home/${DEPLOY_USER}/.ssh/authorized_keys ] && chmod 600 /home/${DEPLOY_USER}/.ssh/authorized_keys || true

            mkdir -p /srv/apps
            chown root:"${DEPLOY_USER}" /srv/apps
            chmod 2775 /srv/apps
            setfacl -m g:"${DEPLOY_USER}":rwx /srv/apps || true
            setfacl -d -m g:"${DEPLOY_USER}":rwx /srv/apps || true

            mkdir -p /srv/infrastructure/webapp-management
            chown -R "${DEPLOY_USER}:${DEPLOY_USER}" /srv/infrastructure/webapp-management
            chmod 2775 /srv/infrastructure/webapp-management

            mkdir -p /srv/infrastructure/ops-scripts
            chown -R "${DEPLOY_USER}:${DEPLOY_USER}" /srv/infrastructure/ops-scripts

            mkdir -p /srv/backups/db-dumps /srv/backups/restic_v2
            chown -R "${DEPLOY_USER}:${DEPLOY_USER}" /srv/backups
            chmod 0755 /srv/backups
            chmod 0700 /srv/backups/db-dumps /srv/backups/restic_v2

            ufw default deny incoming
            ufw default allow outgoing
            sed -i 's/DEFAULT_FORWARD_POLICY="DROP"/DEFAULT_FORWARD_POLICY="ACCEPT"/' /etc/default/ufw
            ufw allow 22/tcp
            ufw allow 80/tcp
            ufw allow 443/tcp
            echo "y" | ufw enable

            cat <<'EOF' >/etc/fail2ban/jail.local
            [DEFAULT]
            bantime  = 1h
            findtime = 10m
            maxretry = 5
            ignoreip = 127.0.0.1/8 ::1

            [sshd]
            enabled = true
            port    = ssh
            EOF

            systemctl restart docker
            systemctl restart fail2ban

            echo "✅ Provisioning finished."
            id "${DEPLOY_USER}"
            ls -ld /srv/apps /srv/backups /srv/infrastructure/webapp-management /srv/infrastructure/ops-scripts

  sync-access:
    needs: bootstrap
    if: ${{ inputs.sync_access_keys }}
    uses: ./.github/workflows/sync-ssh-access.yml
    with:
      target: ${{ inputs.target }}
      server_ip: ${{ inputs.server_ip }}
      deploy_user: ${{ inputs.deploy_user }}
      extra_deploy_public_key: ${{ inputs.infra_public_key }}
      preserve_existing_root_keys: true
    secrets:
      SSH_PRIVATE_KEY_SYNC: ${{ secrets.SSH_PRIVATE_KEY_ROOT }}
