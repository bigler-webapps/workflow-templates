name: 'Cross-server restore — source-side export (B2-direct)'
description: >-
  Pulls the latest (or specified) Restic snapshot for {app}_{source_env}
  directly from B2 on the GitHub-hosted runner, extracts the relevant Postgres
  dump (.sql.gz), encrypts it with a passphrase deterministically derived from
  a pre-shared transport key + run identifier, and uploads it as a short-lived
  GitHub Artifact. Consumed by the cross-server-restore reusable workflow
  (Job A). The matching dest-side composite is restore-dest-import — it derives
  the same passphrase from the same transport key.
  Replaces the previous SSH-to-source-host flow; no longer touches the source
  host at all.

inputs:
  source_target:
    description: 'Inventory target name of the source (used for logging + work-dir naming).'
    required: true
  app_name:
    description: 'App name (e.g. innoservice). Must match ^[a-zA-Z0-9_-]+$.'
    required: true
  source_env:
    description: >-
      Source compose env label (e.g. production). Used to match dump filenames
      in the snapshot. Accepts aliases production↔prod, staging↔stage.
    required: true
  snapshot_id:
    description: 'Restic snapshot ID, or "latest".'
    required: false
    default: 'latest'
  restic_repo_b2:
    description: 'Restic B2 repository URL for the source.'
    required: true
  restic_password:
    description: 'Restic encryption password for the source repo.'
    required: true
  b2_key_id:
    description: 'B2 key ID for the source repo.'
    required: true
  b2_app_key:
    description: 'B2 application key for the source repo.'
    required: true
  transport_key:
    description: 'Pre-shared transport key (org/repo secret). Used together with the run identifier to derive the symmetric encryption passphrase. The matching dest-side composite must receive the same key.'
    required: true
  artifact_retention_days:
    description: 'Retention for the encrypted handoff artifact. Default 1 day.'
    required: false
    default: '1'

outputs:
  artifact_name:
    description: 'Name of the uploaded GitHub Artifact carrying the encrypted dump.'
    value: ${{ steps.compute_names.outputs.artifact_name }}

runs:
  using: 'composite'
  steps:
    - name: 🔎 Validate inputs
      shell: bash
      env:
        INPUT_SOURCE_TARGET: ${{ inputs.source_target }}
        INPUT_APP_NAME: ${{ inputs.app_name }}
        INPUT_SOURCE_ENV: ${{ inputs.source_env }}
        INPUT_SNAPSHOT_ID: ${{ inputs.snapshot_id }}
        RESTIC_REPO_B2: ${{ inputs.restic_repo_b2 }}
        RESTIC_PASSWORD: ${{ inputs.restic_password }}
        B2_KEY_ID: ${{ inputs.b2_key_id }}
        B2_APP_KEY: ${{ inputs.b2_app_key }}
        TRANSPORT_KEY: ${{ inputs.transport_key }}
      run: |
        set -euo pipefail
        required_vars=(RESTIC_REPO_B2 RESTIC_PASSWORD B2_KEY_ID B2_APP_KEY INPUT_APP_NAME INPUT_SOURCE_ENV INPUT_SOURCE_TARGET INPUT_SNAPSHOT_ID TRANSPORT_KEY)
        for var_name in "${required_vars[@]}"; do
          if [ -z "${!var_name}" ]; then
            echo "❌ Missing required input '${var_name}'."
            exit 1
          fi
        done

        printf '%s' "$INPUT_SOURCE_TARGET" | grep -qE '^[a-zA-Z0-9_-]+$' || { echo "❌ Invalid 'source_target' input"; exit 1; }
        printf '%s' "$INPUT_APP_NAME" | grep -qE '^[a-zA-Z0-9_-]+$' || { echo "❌ Invalid 'app_name' input"; exit 1; }
        printf '%s' "$INPUT_SOURCE_ENV" | grep -qE '^[a-zA-Z0-9_-]+$' || { echo "❌ Invalid 'source_env' input"; exit 1; }
        printf '%s' "$INPUT_SNAPSHOT_ID" | grep -qE '^(latest|[a-zA-Z0-9_-]+)$' || { echo "❌ Invalid 'snapshot_id' input"; exit 1; }

    - name: 🧮 Compute work-dir and artifact name
      id: compute_names
      shell: bash
      env:
        RUN_ID: ${{ github.run_id }}
        RUN_ATTEMPT: ${{ github.run_attempt }}
        APP_NAME: ${{ inputs.app_name }}
        SOURCE_TARGET: ${{ inputs.source_target }}
      run: |
        set -euo pipefail
        WORK_TAG="restore-export-${RUN_ID}-${RUN_ATTEMPT}-${APP_NAME}"
        ARTIFACT_NAME="xrestore-${RUN_ID}-${RUN_ATTEMPT}-${SOURCE_TARGET}-${APP_NAME}"
        echo "work_tag=${WORK_TAG}" >> "$GITHUB_OUTPUT"
        echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

    - name: 🔐 Derive run-scoped passphrase from transport key
      shell: bash
      env:
        TRANSPORT_KEY: ${{ inputs.transport_key }}
        RUN_ID: ${{ github.run_id }}
        RUN_ATTEMPT: ${{ github.run_attempt }}
      run: |
        set -euo pipefail
        # Deterministic derivation: same key + run_id + attempt yield same passphrase
        # on both sides of the handoff. Never persisted to outputs/API.
        PASSPHRASE="$(printf '%s:%s:%s' "$TRANSPORT_KEY" "$RUN_ID" "$RUN_ATTEMPT" | sha256sum | awk '{print $1}')"
        echo "::add-mask::${PASSPHRASE}"
        echo "PASSPHRASE=${PASSPHRASE}" >> "$GITHUB_ENV"

    - name: 📦 Install restic + jq on runner
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends restic jq
        echo "restic: $(restic version)"
        echo "jq: $(jq --version)"

    - name: 🛡️  Prepare work dir (mode 700, RUNNER_TEMP)
      id: workdir
      shell: bash
      env:
        WORK_TAG: ${{ steps.compute_names.outputs.work_tag }}
      run: |
        set -euo pipefail
        WORK_DIR="${RUNNER_TEMP}/${WORK_TAG}"
        rm -rf "$WORK_DIR"
        mkdir -p "$WORK_DIR"
        chmod 700 "$WORK_DIR"
        echo "work_dir=${WORK_DIR}" >> "$GITHUB_OUTPUT"

    - name: 🧪 Self-test dump-filename regex (R4)
      shell: bash
      env:
        APP_NAME: ${{ inputs.app_name }}
        SOURCE_ENV: ${{ inputs.source_env }}
      run: |
        set -euo pipefail
        # Mirrors restore.py ENV_ALIASES so the dump-finder regex below
        # accepts both 'production' and 'prod' (and staging↔stage). Keep in
        # sync with restore.py.
        case "$SOURCE_ENV" in
          production) ALIAS="prod" ;;
          prod)       ALIAS="production" ;;
          staging)    ALIAS="stage" ;;
          stage)      ALIAS="staging" ;;
          *)          ALIAS="$SOURCE_ENV" ;;
        esac
        TS_RE='[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{6}Z'
        DUMP_RE="/${APP_NAME}_(${SOURCE_ENV}|${ALIAS})[-_].*_${TS_RE}\\.sql\\.gz\$"
        echo "regex: $DUMP_RE"

        FIXTURES_POS=(
          "/srv/backups/db-dumps/${APP_NAME}_${SOURCE_ENV}-db-1_${APP_NAME}_2025-01-15T020000Z.sql.gz"
          "/srv/backups/db-dumps/${APP_NAME}_${ALIAS}-db-1_${APP_NAME}_2025-01-15T020000Z.sql.gz"
          "/srv/backups/db-dumps/${APP_NAME}_${SOURCE_ENV}_db_${APP_NAME}_2025-01-15T020000Z.sql.gz"
          "/srv/backups/db-dumps/${APP_NAME}_${ALIAS}_db_${APP_NAME}_2025-01-15T020000Z.sql.gz"
        )
        FIXTURES_NEG=(
          "/srv/backups/db-dumps/other_${SOURCE_ENV}-db-1_other_2025-01-15T020000Z.sql.gz"
          "/srv/backups/db-dumps/${APP_NAME}_unrelated_db_${APP_NAME}_2025-01-15T020000Z.sql.gz"
          "/srv/backups/db-dumps/${APP_NAME}_${SOURCE_ENV}-db-1_${APP_NAME}_notatimestamp.sql.gz"
          "/srv/backups/db-dumps/${APP_NAME}_${SOURCE_ENV}-db-1_${APP_NAME}_2025-01-15T020000Z.sql"
        )

        for f in "${FIXTURES_POS[@]}"; do
          printf '%s\n' "$f" | grep -qE "$DUMP_RE" || { echo "❌ regex SHOULD match but doesn't: $f"; exit 1; }
        done
        for f in "${FIXTURES_NEG[@]}"; do
          if printf '%s\n' "$f" | grep -qE "$DUMP_RE"; then
            echo "❌ regex should NOT match but does: $f"; exit 1;
          fi
        done
        echo "✅ regex self-test passed (${#FIXTURES_POS[@]} positive, ${#FIXTURES_NEG[@]} negative)"

    - name: 🔍 Resolve snapshot + find dump path
      id: resolve
      shell: bash
      env:
        RESTIC_REPOSITORY: ${{ inputs.restic_repo_b2 }}
        RESTIC_PASSWORD: ${{ inputs.restic_password }}
        AWS_ACCESS_KEY_ID: ${{ inputs.b2_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.b2_app_key }}
        APP_NAME: ${{ inputs.app_name }}
        SOURCE_ENV: ${{ inputs.source_env }}
        SNAPSHOT_INPUT: ${{ inputs.snapshot_id }}
      run: |
        set -euo pipefail

        if [ "$SNAPSHOT_INPUT" = "latest" ]; then
          SNAP="$(restic snapshots --latest 1 --json | jq -r '.[0].id // empty')"
        else
          SNAP="$(restic snapshots "$SNAPSHOT_INPUT" --json | jq -r '.[0].id // empty')"
        fi
        if [ -z "$SNAP" ]; then
          echo "❌ Snapshot '${SNAPSHOT_INPUT}' could not be resolved against ${RESTIC_REPOSITORY}."
          exit 1
        fi
        echo "snapshot_id=${SNAP}" >> "$GITHUB_OUTPUT"
        echo "Resolved snapshot: ${SNAP}"

        case "$SOURCE_ENV" in
          production) ALIAS="prod" ;;
          prod)       ALIAS="production" ;;
          staging)    ALIAS="stage" ;;
          stage)      ALIAS="staging" ;;
          *)          ALIAS="$SOURCE_ENV" ;;
        esac
        TS_RE='[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{6}Z'
        DUMP_RE="/${APP_NAME}_(${SOURCE_ENV}|${ALIAS})[-_].*_${TS_RE}\\.sql\\.gz\$"

        ALL_SQL_GZ="$(restic ls "$SNAP" | grep -E '\.sql\.gz$' || true)"
        if [ -z "$ALL_SQL_GZ" ]; then
          echo "❌ No .sql.gz files in snapshot ${SNAP}."
          exit 1
        fi

        # Lexicographic sort works because ts is YYYY-MM-DDTHHMMSSZ.
        DUMP_PATH="$(printf '%s\n' "$ALL_SQL_GZ" | grep -E "$DUMP_RE" | sort | tail -1 || true)"
        if [ -z "$DUMP_PATH" ]; then
          echo "❌ No dump matching app='${APP_NAME}' source_env='${SOURCE_ENV}' (alias='${ALIAS}') in snapshot ${SNAP}."
          echo "   Regex used: ${DUMP_RE}"
          echo "   Candidates in snapshot (all .sql.gz):"
          printf '%s\n' "$ALL_SQL_GZ" | sed 's/^/     /'
          exit 1
        fi
        echo "dump_path=${DUMP_PATH}" >> "$GITHUB_OUTPUT"
        echo "Selected dump: ${DUMP_PATH}"

    - name: 💾 Restic dump → local file
      shell: bash
      env:
        RESTIC_REPOSITORY: ${{ inputs.restic_repo_b2 }}
        RESTIC_PASSWORD: ${{ inputs.restic_password }}
        AWS_ACCESS_KEY_ID: ${{ inputs.b2_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.b2_app_key }}
        SNAP: ${{ steps.resolve.outputs.snapshot_id }}
        DUMP_PATH: ${{ steps.resolve.outputs.dump_path }}
        WORK_DIR: ${{ steps.workdir.outputs.work_dir }}
      run: |
        set -euo pipefail
        OUT="${WORK_DIR}/dump.sql.gz"
        restic dump "$SNAP" "$DUMP_PATH" > "$OUT"
        chmod 600 "$OUT"
        if [ ! -s "$OUT" ]; then
          echo "❌ Dump file is empty: $OUT"
          exit 1
        fi
        ls -la "$WORK_DIR"

    - name: 📝 Write manifest
      shell: bash
      env:
        WORK_DIR: ${{ steps.workdir.outputs.work_dir }}
        APP_NAME: ${{ inputs.app_name }}
        SOURCE_TARGET: ${{ inputs.source_target }}
        SOURCE_ENV: ${{ inputs.source_env }}
        SNAP: ${{ steps.resolve.outputs.snapshot_id }}
        DUMP_PATH: ${{ steps.resolve.outputs.dump_path }}
      run: |
        set -euo pipefail
        jq -n \
          --arg app "$APP_NAME" \
          --arg source_target "$SOURCE_TARGET" \
          --arg source_env "$SOURCE_ENV" \
          --arg snapshot_id "$SNAP" \
          --arg dump_path_in_snapshot "$DUMP_PATH" \
          '{app:$app, source_target:$source_target, source_env:$source_env, snapshot_id:$snapshot_id, dump_path_in_snapshot:$dump_path_in_snapshot}' \
          > "${WORK_DIR}/manifest.json"
        chmod 600 "${WORK_DIR}/manifest.json"

    - name: 🔒 Tar + encrypt dump
      shell: bash
      env:
        WORK_DIR: ${{ steps.workdir.outputs.work_dir }}
        WORK_TAG: ${{ steps.compute_names.outputs.work_tag }}
        ENC_PASS: ${{ env.PASSPHRASE }}
      run: |
        set -euo pipefail
        ENC_FILE="${WORK_DIR}/dump.tar.enc"
        # tar from WORK_DIR (members at root: dump.sql.gz, manifest.json), pipe through openssl.
        # AES-256-CBC + PBKDF2 + salt — deterministic across openssl 1.1+/3.x.
        # Format unchanged from the previous SSH-based flow so the dest-side
        # composite (restore-dest-import) decrypts and untars identically.
        tar -C "$WORK_DIR" -cf - dump.sql.gz manifest.json \
          | openssl enc -aes-256-cbc -pbkdf2 -salt -pass env:ENC_PASS -out "$ENC_FILE"
        chmod 600 "$ENC_FILE"
        ls -la "$ENC_FILE"

    - name: 🧯 Remove plaintext dump from runner
      shell: bash
      env:
        WORK_DIR: ${{ steps.workdir.outputs.work_dir }}
      run: |
        set -euo pipefail
        # Minimise the plaintext-on-runner window: drop the cleartext dump as
        # soon as the encrypted bundle exists. The encrypted .tar.enc stays
        # in WORK_DIR for the upload step.
        rm -f "${WORK_DIR}/dump.sql.gz" "${WORK_DIR}/manifest.json"

    - name: 📤 Upload encrypted dump as artifact
      uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
      with:
        name: ${{ steps.compute_names.outputs.artifact_name }}
        path: ${{ steps.workdir.outputs.work_dir }}/dump.tar.enc
        retention-days: ${{ inputs.artifact_retention_days }}
        if-no-files-found: error

    - name: 🧹 Cleanup runner work dir
      if: always()
      shell: bash
      env:
        WORK_DIR: ${{ steps.workdir.outputs.work_dir }}
      run: |
        set -euo pipefail
        rm -rf "$WORK_DIR"
