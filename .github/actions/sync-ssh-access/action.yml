name: 'Sync SSH Access Keys'
description: 'Syncs root + deploy authorized_keys to a server from access/ directory in caller working dir.'

inputs:
  target:
    description: 'Inventory target name (used for logging)'
    required: true
  target_host:
    description: 'Server host address (overrides ssh_host if provided)'
    required: false
    default: ''
  ssh_host:
    description: 'SSH host address (used if target_host is empty)'
    required: true
  ssh_private_key:
    description: 'Root-capable SSH private key for sync'
    required: true
  deploy_user:
    description: 'Deploy user whose authorized_keys should be managed'
    required: true
  extra_deploy_public_key:
    description: 'Optional single public key appended to deploy authorized_keys'
    required: false
    default: ''
  preserve_existing_root_keys:
    description: 'Append managed root keys instead of replacing current root authorized_keys'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: 🔎 Validate inputs
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_DEPLOY_USER: ${{ inputs.deploy_user }}
        INPUT_TARGET_HOST: ${{ inputs.target_host }}
        INPUT_EXTRA_KEY: ${{ inputs.extra_deploy_public_key }}
      run: |
        set -euo pipefail

        if ! printf '%s' "$INPUT_TARGET" | grep -qE '^[a-zA-Z0-9_-]+$'; then
          echo "❌ Invalid 'target' input"
          exit 1
        fi
        if [ -n "${INPUT_DEPLOY_USER:-}" ] && ! printf '%s' "$INPUT_DEPLOY_USER" | grep -qE '^[a-z_][a-z0-9_-]{0,31}$'; then
          echo "❌ Invalid 'deploy_user' input"
          exit 1
        fi
        if [ -n "${INPUT_TARGET_HOST:-}" ] && ! printf '%s' "$INPUT_TARGET_HOST" | grep -qE '^[a-zA-Z0-9._:-]+$'; then
          echo "❌ Invalid 'target_host' input"
          exit 1
        fi
        if [ -n "${INPUT_EXTRA_KEY:-}" ]; then
          line_count=$(printf '%s' "$INPUT_EXTRA_KEY" | wc -l)
          if [ "$line_count" -gt 0 ]; then
            echo "❌ extra_deploy_public_key must be a single line (no newlines)"
            exit 1
          fi
          if ! printf '%s' "$INPUT_EXTRA_KEY" | grep -qE '^(ssh-(rsa|ed25519|dss)|ecdsa-sha2-[a-z0-9-]+)[[:space:]]+[A-Za-z0-9+/=]+([[:space:]]+\S+)?$'; then
            echo "❌ extra_deploy_public_key does not match expected OpenSSH key format"
            exit 1
          fi
        fi
        echo "✅ Inputs validated."

    - name: Resolve target host
      shell: bash
      env:
        TARGET_HOST_INPUT: ${{ inputs.target_host }}
        SSH_HOST_INPUT: ${{ inputs.ssh_host }}
      run: |
        set -euo pipefail
        TARGET_HOST="${TARGET_HOST_INPUT}"
        if [ -z "$TARGET_HOST" ]; then
          TARGET_HOST="${SSH_HOST_INPUT}"
        fi
        if [ -z "$TARGET_HOST" ]; then
          echo "❌ No target host provided and ssh_host input is empty."
          exit 1
        fi
        echo "TARGET_HOST=$TARGET_HOST" >> "$GITHUB_ENV"

    - name: Check secrets and export runtime env
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
        DEPLOY_USER: ${{ inputs.deploy_user }}
        PRESERVE_ROOT_INPUT: ${{ inputs.preserve_existing_root_keys }}
      run: |
        set -euo pipefail
        if [ -z "$SSH_PRIVATE_KEY" ]; then
          echo "❌ No root-capable SSH private key provided (ssh_private_key input)."
          exit 1
        fi
        if [ -z "$DEPLOY_USER" ]; then
          echo "❌ No deploy_user provided."
          exit 1
        fi
        echo "DEPLOY_USER=$DEPLOY_USER" >> "$GITHUB_ENV"
        echo "PRESERVE_ROOT=$PRESERVE_ROOT_INPUT" >> "$GITHUB_ENV"

    - name: 🔑 Write SSH key
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ inputs.ssh_private_key }}
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh
        printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_sync
        chmod 600 ~/.ssh/id_sync

    - name: ⚙️ Add known hosts
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh
        ssh-keyscan -H "$TARGET_HOST" >> ~/.ssh/known_hosts

    - name: 🔐 Sync SSH Access Keys
      shell: bash
      env:
        INPUT_EXTRA_KEY: ${{ inputs.extra_deploy_public_key }}
      run: |
        set -euo pipefail

        echo "Preparing keys..."
        mkdir -p generated_keys
        bash -c "shopt -s nullglob; cat access/root/*.pub > generated_keys/root_keys || true; [ -s generated_keys/root_keys ] || touch generated_keys/root_keys"
        bash -c "shopt -s nullglob; cat access/deploy/*.pub access/infrastructure/*.pub > generated_keys/deploy_keys || true; [ -s generated_keys/deploy_keys ] || touch generated_keys/deploy_keys"

        if [ -n "${INPUT_EXTRA_KEY:-}" ]; then
          # Format already validated in 'Validate inputs' step.
          printf '%s\n' "$INPUT_EXTRA_KEY" >> generated_keys/deploy_keys
          sort -u generated_keys/deploy_keys -o generated_keys/deploy_keys
        fi

        echo "Uploading keys..."
        scp -i ~/.ssh/id_sync -o IdentitiesOnly=yes generated_keys/* "root@$TARGET_HOST:/tmp/"

        echo "Applying keys on server..."
        ssh -i ~/.ssh/id_sync -o IdentitiesOnly=yes "root@$TARGET_HOST" "bash -lc '
          set -euo pipefail

          mkdir -p /root/.ssh
          touch /root/.ssh/authorized_keys

          if [ \"$PRESERVE_ROOT\" = \"true\" ]; then
            cat /tmp/root_keys >> /root/.ssh/authorized_keys
            sort -u /root/.ssh/authorized_keys -o /root/.ssh/authorized_keys
            rm -f /tmp/root_keys
          else
            mv /tmp/root_keys /root/.ssh/authorized_keys
          fi

          chmod 600 /root/.ssh/authorized_keys
          chown root:root /root/.ssh/authorized_keys

          mkdir -p /home/$DEPLOY_USER/.ssh
          mv /tmp/deploy_keys /home/$DEPLOY_USER/.ssh/authorized_keys
          chmod 600 /home/$DEPLOY_USER/.ssh/authorized_keys
          chown $DEPLOY_USER:$DEPLOY_USER /home/$DEPLOY_USER/.ssh/authorized_keys
        '"
