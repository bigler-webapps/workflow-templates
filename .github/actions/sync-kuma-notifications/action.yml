name: 'Sync Uptime Kuma Notifications'
description: 'Reads a YAML config and idempotently registers or updates notification channels in Uptime Kuma. Notifications marked default:true are auto-applied to all monitors. Connects via SSH tunnel to the host (Kuma must be bound to 127.0.0.1:3001 there).'

# v2.0.0 — Tailscale-SSH-only. ssh_private_key removed.
# ssh -fNL port-forward works over Tailnet plain-ssh (auth=none).

inputs:
  config_path:
    description: 'Path to notifications YAML (relative to repo root).'
    required: false
    default: 'monitoring/notifications.yml'
  ssh_host:
    description: 'Tailnet hostname for tunnel into the Kuma server.'
    required: true
  ssh_user:
    description: 'SSH user (typically deploy).'
    required: true
  kuma_user:
    description: 'Automation user in Kuma.'
    required: true
  kuma_password:
    description: 'Password for the automation user.'
    required: true
  kuma_local_port:
    description: 'Server-side localhost port Kuma listens on (matches docker-compose port binding).'
    required: false
    default: '3001'
  discord_webhook_url:
    description: 'Discord webhook URL — exposed to the script via ${DISCORD_WEBHOOK_URL} so the config can reference it.'
    required: false
    default: ''
  prune:
    description: 'Set "true" to delete Kuma notifications not present in the config file.'
    required: false
    default: 'false'
  ts_oauth_client_id:
    description: 'Tailscale OAuth client ID. Required (v2.0.0+).'
    required: true
  ts_oauth_secret:
    description: 'Tailscale OAuth client secret.'
    required: true
  ts_tag:
    description: 'Tailnet tag for the ephemeral CI node.'
    required: false
    default: 'tag:ci-deploy'

runs:
  using: composite
  steps:
    - name: 🔗 Join Tailnet
      uses: tailscale/github-action@v3   # TODO S33: SHA-pin via Renovate
      with:
        oauth-client-id: ${{ inputs.ts_oauth_client_id }}
        oauth-secret: ${{ inputs.ts_oauth_secret }}
        tags: ${{ inputs.ts_tag }}
        version: latest

    - name: 🔎 Validate Tailnet inputs
      shell: bash
      env:
        INPUT_TS_OAUTH_CLIENT_ID: ${{ inputs.ts_oauth_client_id }}
        INPUT_TS_OAUTH_SECRET: ${{ inputs.ts_oauth_secret }}
      run: |
        set -euo pipefail
        if [ -z "$INPUT_TS_OAUTH_CLIENT_ID" ] || [ -z "$INPUT_TS_OAUTH_SECRET" ]; then
          echo "❌ ts_oauth_client_id and ts_oauth_secret are required (v2.0.0+)"
          exit 1
        fi
        echo "✅ Tailnet OAuth inputs present."

    - name: Setup Python
      uses: actions/setup-python@b64ffcaf5b410884ad320a9cfac8866006a109aa  # v5.6.0
      with:
        python-version: '3.11'

    - name: Install kuma deps
      shell: bash
      # Kuma 2.x server requires a Kuma-2-aware client. Upstream
      # `lucasheld/uptime-kuma-api` is de facto abandoned: last release Sept
      # 2023, PRs untouched since April 2025, multiple Kuma-2 compat issues
      # sitting open (#85, #86, #87). Until an official successor exists, we
      # pin the `exaland/uptime-kuma-api-v2` fork (published on PyPI as
      # `uptime-kuma-api-v2`). Drop-in: same import
      # `from uptime_kuma_api import UptimeKumaApi`. Last commit 2026-05-22,
      # explicitly Kuma 2.x targeted. Tiny community (7 stars) — accept that
      # risk because there is no better option in the ecosystem today.
      # Symptom of mismatch (Kuma 2 server + Kuma 1.x client): engine.io
      # polling fails with ConnectionResetError(104) during the Socket.IO
      # handshake. TODO S33: SHA-pin via Renovate when stable.
      run: pip install --quiet "uptime-kuma-api-v2==1.0.2" "PyYAML==6.0.2"

    - name: Open SSH tunnel to Kuma
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        KUMA_PORT: ${{ inputs.kuma_local_port }}
      run: |
        set -euo pipefail
        # Plain ssh over Tailnet — auth=none (Tailscale-SSH server-side).
        # -fNL works because we're using system OpenSSH client, not
        # `tailscale ssh` (which doesn't accept ssh-style flags).
        ssh -o StrictHostKeyChecking=accept-new -o ExitOnForwardFailure=yes \
            -fNL "${KUMA_PORT}:localhost:${KUMA_PORT}" \
            "${SSH_USER}@${SSH_HOST}"
        # Give the forwarder a moment to settle.
        for _ in $(seq 1 10); do
          if curl -sf "http://localhost:${KUMA_PORT}/" -o /dev/null; then
            echo "✅ Kuma reachable via tunnel"
            break
          fi
          sleep 1
        done

    - name: Sync notifications
      shell: bash
      env:
        KUMA_URL: http://localhost:${{ inputs.kuma_local_port }}
        KUMA_AUTOMATION_USER: ${{ inputs.kuma_user }}
        KUMA_AUTOMATION_PASSWORD: ${{ inputs.kuma_password }}
        DISCORD_WEBHOOK_URL: ${{ inputs.discord_webhook_url }}
      run: |
        set -euo pipefail
        PRUNE_FLAG=""
        if [ "${{ inputs.prune }}" = "true" ]; then
          PRUNE_FLAG="--prune"
        fi
        python "${GITHUB_ACTION_PATH}/../../../scripts/kuma_sync.py" \
          notifications \
          --config "${{ inputs.config_path }}" \
          ${PRUNE_FLAG}

    - name: Close SSH tunnel
      if: always()
      shell: bash
      env:
        KUMA_PORT: ${{ inputs.kuma_local_port }}
      run: |
        # v2.0.0: narrow pkill pattern includes port-forward spec so it
        # never matches unrelated ssh processes (e.g. tailscale's internal
        # ProxyCommand plumbing on the runner).
        pkill -f "ssh .* -fNL ${KUMA_PORT}:localhost:${KUMA_PORT}" || true
