name: 'Sync Uptime Kuma Notifications'
description: 'Reads a YAML config and idempotently registers or updates notification channels in Uptime Kuma. Notifications marked default:true are auto-applied to all monitors.'

# v2.0.1 — Tailscale Serve direct-HTTPS, same pattern as register-kuma-monitors.
# SSH-tunnel removed; Kuma is reachable as https://<host>.tail990d7f.ts.net:8443
# via tailnet (configured via `tailscale serve` on the Kuma host).

inputs:
  config_path:
    description: 'Path to notifications YAML (relative to repo root).'
    required: false
    default: 'monitoring/notifications.yml'
  kuma_url:
    description: 'Full URL to Kuma over Tailnet (e.g. https://monitoring.tail990d7f.ts.net:8443).'
    required: false
    default: 'https://monitoring.tail990d7f.ts.net:8443'
  kuma_user:
    description: 'Automation user in Kuma.'
    required: true
  kuma_password:
    description: 'Password for the automation user.'
    required: true
  discord_webhook_url:
    description: 'Discord webhook URL — exposed to the script via ${DISCORD_WEBHOOK_URL} so the config can reference it.'
    required: false
    default: ''
  prune:
    description: 'Set "true" to delete Kuma notifications not present in the config file.'
    required: false
    default: 'false'
  ts_oauth_client_id:
    description: 'Tailscale OAuth client ID. Required.'
    required: true
  ts_oauth_secret:
    description: 'Tailscale OAuth client secret.'
    required: true
  ts_tag:
    description: 'Tailnet tag for the ephemeral CI node.'
    required: false
    default: 'tag:ci-deploy'

runs:
  using: composite
  steps:
    - name: Connect to tailnet
      uses: bigler-webapps/workflow-templates/.github/actions/tailnet-connect@v2.5.2
      with:
        ts_oauth_client_id: ${{ inputs.ts_oauth_client_id }}
        ts_oauth_secret: ${{ inputs.ts_oauth_secret }}
        ts_tag: ${{ inputs.ts_tag }}

    - name: 🔎 Validate inputs
      shell: bash
      env:
        INPUT_TS_OAUTH_CLIENT_ID: ${{ inputs.ts_oauth_client_id }}
        INPUT_TS_OAUTH_SECRET: ${{ inputs.ts_oauth_secret }}
        INPUT_KUMA_URL: ${{ inputs.kuma_url }}
      run: |
        set -euo pipefail
        if [ -z "$INPUT_TS_OAUTH_CLIENT_ID" ] || [ -z "$INPUT_TS_OAUTH_SECRET" ]; then
          echo "❌ ts_oauth_client_id and ts_oauth_secret are required"
          exit 1
        fi
        if ! printf '%s' "$INPUT_KUMA_URL" | grep -qE '^https?://[a-zA-Z0-9._:-]+(/.*)?$'; then
          echo "❌ Invalid kuma_url (expected http(s)://host[:port])"
          exit 1
        fi
        echo "✅ Inputs validated."

    - name: Setup Python
      uses: actions/setup-python@b64ffcaf5b410884ad320a9cfac8866006a109aa  # v5.6.0
      with:
        python-version: '3.11'

    - name: Install kuma deps
      shell: bash
      # Kuma 2.x server requires a Kuma-2-aware client. See
      # register-kuma-monitors action.yml for the rationale behind the
      # uptime-kuma-api-v2 fork.
      run: pip install --quiet "uptime-kuma-api-v2==1.0.2" "PyYAML==6.0.2"

    - name: 🔌 Pre-flight Kuma reachability check
      shell: bash
      env:
        KUMA_URL: ${{ inputs.kuma_url }}
      run: |
        set -euo pipefail
        if ! curl -sf --max-time 10 -o /dev/null -w "%{http_code}\n" "${KUMA_URL}/" | grep -qE '^(200|302)$'; then
          echo "❌ Kuma not reachable at ${KUMA_URL}"
          exit 1
        fi
        echo "✅ Kuma reachable at ${KUMA_URL}"

    - name: Sync notifications
      shell: bash
      env:
        KUMA_URL: ${{ inputs.kuma_url }}
        KUMA_AUTOMATION_USER: ${{ inputs.kuma_user }}
        KUMA_AUTOMATION_PASSWORD: ${{ inputs.kuma_password }}
        DISCORD_WEBHOOK_URL: ${{ inputs.discord_webhook_url }}
        # S20-pattern: route caller-supplied inputs through env vars instead of
        # ${{ ... }} interpolation inside the shell body, so values containing
        # shell metacharacters (`; rm -rf /`) cannot escape the variable.
        INPUT_PRUNE: ${{ inputs.prune }}
        INPUT_CONFIG_PATH: ${{ inputs.config_path }}
      run: |
        set -euo pipefail
        PRUNE_FLAG=""
        if [ "$INPUT_PRUNE" = "true" ]; then
          PRUNE_FLAG="--prune"
        fi
        python "${GITHUB_ACTION_PATH}/../../../scripts/kuma_sync.py" \
          notifications \
          --config "$INPUT_CONFIG_PATH" \
          ${PRUNE_FLAG}
