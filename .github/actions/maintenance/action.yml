name: 'Maintenance — Reboot if needed'
description: 'Installs apt updates, decides whether reboot is needed, reboots and waits for host, then checks containers.'

# v2.0.0 — Tailscale-SSH-only. ssh_private_key removed.
# Logs in as deploy with sudo -n (NOPASSWD covers apt-get + reboot via
# the biglerconsult.infra.deploy_user role sudoers config).

inputs:
  target:
    description: 'Inventory target name (used for logging)'
    required: true
  ssh_host:
    description: 'Tailnet hostname'
    required: true
  ssh_user:
    description: 'SSH user (typically deploy)'
    required: true
  apply_updates:
    description: 'Install apt updates before reboot decision'
    required: false
    default: 'true'
  force_reboot:
    description: 'Force reboot even if /var/run/reboot-required is absent'
    required: false
    default: 'false'
  expected_container_tokens_json:
    description: 'JSON-array of substrings expected in running container names after reboot'
    required: false
    default: '[]'
  ts_oauth_client_id:
    description: 'Tailscale OAuth client ID. Required (v2.0.0+).'
    required: true
  ts_oauth_secret:
    description: 'Tailscale OAuth client secret.'
    required: true
  ts_tag:
    description: 'Tailnet tag for the ephemeral CI node.'
    required: false
    default: 'tag:ci-deploy'

runs:
  using: 'composite'
  steps:
    - name: Connect to tailnet
      uses: bigler-webapps/workflow-templates/.github/actions/tailnet-connect@v2.5.2
      with:
        ts_oauth_client_id: ${{ inputs.ts_oauth_client_id }}
        ts_oauth_secret: ${{ inputs.ts_oauth_secret }}
        ts_tag: ${{ inputs.ts_tag }}

    - name: Validate inputs
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_SSH_USER: ${{ inputs.ssh_user }}
        INPUT_SSH_HOST: ${{ inputs.ssh_host }}
        INPUT_TS_OAUTH_CLIENT_ID: ${{ inputs.ts_oauth_client_id }}
        INPUT_TS_OAUTH_SECRET: ${{ inputs.ts_oauth_secret }}
      run: |
        set -euo pipefail
        if [ -z "$INPUT_TS_OAUTH_CLIENT_ID" ] || [ -z "$INPUT_TS_OAUTH_SECRET" ]; then
          echo "❌ ts_oauth_client_id and ts_oauth_secret are required (v2.0.0+)"
          exit 1
        fi
        required_vars=(SSH_HOST SSH_USER)
        for var_name in "${required_vars[@]}"; do
          if [ -z "${!var_name}" ]; then
            echo "❌ Missing required input '${var_name}' for target '${INPUT_TARGET}'."
            exit 1
          fi
        done

        printf '%s' "$INPUT_TARGET" | grep -qE '^[a-zA-Z0-9_-]+$' || { echo "❌ Invalid 'target' input"; exit 1; }
        printf '%s' "$INPUT_SSH_USER" | grep -qE '^[a-z_][a-z0-9_-]{0,31}$' || { echo "❌ Invalid 'ssh_user' input"; exit 1; }
        printf '%s' "$INPUT_SSH_HOST" | grep -qE '^[a-zA-Z0-9._:-]+$' || { echo "❌ Invalid 'ssh_host' input"; exit 1; }

    - name: 🛠️ Kick off system updates
      if: ${{ inputs.apply_updates == 'true' }}
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        RUN_TOKEN: ${{ github.run_id }}-${{ github.run_attempt }}
      run: |
        set -euo pipefail
        # apt-get upgrade can restart sshd (needrestart) mid-session, which
        # drops this ssh connection with exit 255 even though the upgrade
        # itself succeeds on the remote host. Decouple the upgrade from this
        # SSH session entirely: write a script, launch it detached
        # (setsid + nohup, disowned) so a dropped connection cannot kill it,
        # and let the next step poll for completion with reconnect tolerance.
        ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" bash -s -- "/tmp/gha-maintenance-${RUN_TOKEN}" << "EOF"
        set -euo pipefail
        STATUS_DIR="$1"
        mkdir -p "$STATUS_DIR"
        rm -f "$STATUS_DIR/done" "$STATUS_DIR/exit_code" "$STATUS_DIR/log"

        cat > "$STATUS_DIR/run.sh" << "SCRIPT"
        #!/bin/bash
        set -uo pipefail
        STATUS_DIR="$(cd "$(dirname "$0")" && pwd)"
        SUDO=""
        if [ "$(id -u)" -ne 0 ]; then
          SUDO="sudo -n"
        fi
        (
          set -e
          echo "Refreshing apt index..."
          $SUDO apt-get update -y

          BEFORE_COUNT="$($SUDO apt list --upgradable 2>/dev/null | tail -n +2 | wc -l || true)"
          echo "Upgradable packages before upgrade: ${BEFORE_COUNT}"

          if [ "${BEFORE_COUNT}" -gt 0 ]; then
            echo "Installing upgrades..."
            # Avoid relying on DEBIAN_FRONTEND via sudo (requires SETENV: in
            # sudoers). Pass non-interactive behaviour as apt/dpkg options
            # directly so this works on every provisioned server.
            APT_OPTS=(-y -o Dpkg::Options::=--force-confdef -o Dpkg::Options::=--force-confold)
            $SUDO apt-get "${APT_OPTS[@]}" upgrade
            $SUDO apt-get "${APT_OPTS[@]}" autoremove
            $SUDO apt-get -y autoclean
          else
            echo "No package upgrades required."
          fi

          AFTER_COUNT="$($SUDO apt list --upgradable 2>/dev/null | tail -n +2 | wc -l || true)"
          echo "Upgradable packages after upgrade: ${AFTER_COUNT}"
        ) > "$STATUS_DIR/log" 2>&1
        # Capture the subshell's own exit code, not the last redirected
        # command's — the subshell runs its own `set -e` so it stops (and
        # exits non-zero) on the first failing apt/dpkg command instead of
        # silently continuing to the final (near-always-zero) echo.
        RC=$?
        echo "$RC" > "$STATUS_DIR/exit_code"
        touch "$STATUS_DIR/done"
        SCRIPT
        chmod +x "$STATUS_DIR/run.sh"

        setsid nohup "$STATUS_DIR/run.sh" >/dev/null 2>&1 < /dev/null &
        disown
        echo "Upgrade kicked off in background (status dir: $STATUS_DIR)."
        EOF

    - name: ⏳ Wait for system updates to finish
      if: ${{ inputs.apply_updates == 'true' }}
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        RUN_TOKEN: ${{ github.run_id }}-${{ github.run_attempt }}
      run: |
        set -euo pipefail
        STATUS_DIR="/tmp/gha-maintenance-${RUN_TOKEN}"

        echo "Waiting for the remote apt upgrade to finish..."
        DONE="no"
        for i in $(seq 1 60); do
          if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 "${SSH_USER}@${SSH_HOST}" "test -f '${STATUS_DIR}/done'" 2>/dev/null; then
            DONE="yes"
            break
          fi
          sleep 10
        done

        if [ "$DONE" != "yes" ]; then
          # Do not clean up STATUS_DIR here: the detached run.sh may still be
          # legitimately mid-upgrade on a slow box. Deleting it now would not
          # stop that process but would make its later log/exit_code/done
          # writes fail silently, destroying the only postmortem evidence for
          # a genuinely stuck run.
          echo "::error::Remote apt upgrade did not finish within timeout."
          exit 1
        fi

        echo "--- remote apt log ---"
        ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "cat '${STATUS_DIR}/log'" || true
        echo "--- end log ---"

        EXIT_CODE="$(ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "cat '${STATUS_DIR}/exit_code'")"
        echo "Remote apt upgrade exit code: ${EXIT_CODE}"

        ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "rm -rf '${STATUS_DIR}'" || true

        if [ "$EXIT_CODE" != "0" ]; then
          echo "::error::Remote apt upgrade failed with exit code ${EXIT_CODE}."
          exit 1
        fi

    - name: 🤔 Decide whether reboot is needed
      id: decision
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        FORCE_REBOOT: ${{ inputs.force_reboot }}
      run: |
        set -euo pipefail

        NEED_REBOOT="no"
        REASON="none"

        if [ "$FORCE_REBOOT" = "true" ]; then
          NEED_REBOOT="yes"
          REASON="forced"
        elif ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "test -f /var/run/reboot-required"; then
          NEED_REBOOT="yes"
          REASON="reboot-required"
        fi

        echo "need_reboot=$NEED_REBOOT" >> "$GITHUB_OUTPUT"
        echo "reason=$REASON" >> "$GITHUB_OUTPUT"

        echo "Decision: need_reboot=$NEED_REBOOT (reason=$REASON)"
        # Informational only — the decision above is already final, so a
        # transient connection drop here (e.g. a sshd restart from the prior
        # apt upgrade) must not fail this step.
        ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "uname -a; uptime" || true

    - name: ⏭️ Skip reboot
      if: steps.decision.outputs.need_reboot != 'yes'
      shell: bash
      run: echo "No reboot required. Finishing maintenance run."

    - name: 🔁 Trigger reboot
      if: steps.decision.outputs.need_reboot == 'yes'
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
      run: |
        set -euo pipefail
        ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "sudo -n systemctl reboot || sudo -n reboot || reboot" || true
        echo "Reboot command sent."

    - name: ⏳ Wait for host to come back
      if: steps.decision.outputs.need_reboot == 'yes'
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
      run: |
        set -euo pipefail
        # Tailscale-SSH reconnect: after reboot, tailscaled comes back up,
        # the node re-advertises in the tailnet, and plain ssh (auth=none)
        # works again. Magic-DNS resolution stays cached at the runner.
        echo "Waiting for SSH to become reachable again..."
        sleep 15

        for i in $(seq 1 60); do
          if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 "${SSH_USER}@${SSH_HOST}" "echo online" >/dev/null 2>&1; then
            echo "Host is reachable again."
            exit 0
          fi
          sleep 10
        done

        echo "::error::Host did not come back within timeout."
        exit 1

    - name: 🔍 Post-check containers
      if: steps.decision.outputs.need_reboot == 'yes'
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        EXPECTED_CONTAINER_TOKENS_JSON: ${{ inputs.expected_container_tokens_json }}
      run: |
        set -euo pipefail

        ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" "uptime"
        echo

        echo "Running containers:"
        ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" 'docker ps --format "table {{.Names}}\t{{.Status}}"'
        echo

        CONTAINER_NAMES="$(ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 "${SSH_USER}@${SSH_HOST}" 'docker ps --format "{{.Names}}"')"
        export CONTAINER_NAMES

        python3 - <<'PYCODE'
        import json
        import os

        names = os.environ.get("CONTAINER_NAMES", "").splitlines()
        expected = json.loads(os.environ.get("EXPECTED_CONTAINER_TOKENS_JSON", "[]"))
        missing = [token for token in expected if not any(token in name for name in names)]
        if missing:
            print("Missing expected container token(s):", ", ".join(missing))
            raise SystemExit(1)

        print("All expected app/infrastructure container groups are present.")
        PYCODE
