name: 'Terraform Plan'
description: 'Runs terraform plan and posts the output as a PR comment.'

inputs:
  working_directory:
    description: 'Path containing the Terraform root module'
    required: false
    default: 'terraform'
  terraform_version:
    description: 'Terraform CLI version'
    required: false
    default: '1.9.0'
  tf_cloud_token:
    description: 'Terraform Cloud API token (for state backend auth)'
    required: true
  cloudflare_api_token:
    description: 'Cloudflare API token (TF_VAR_cloudflare_api_token)'
    required: true
  cloudflare_account_id:
    description: 'Cloudflare Account ID (TF_VAR_cloudflare_account_id)'
    required: true
  cloudflare_access_api_token:
    description: 'Cloudflare API token scoped to Zero Trust Access (TF_VAR_cloudflare_access_api_token). Separate from cloudflare_api_token to keep DNS/Tunnel and Access blast-radius isolated. Opt-in: only required when the Terraform module declares this variable.'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for PR comment (typically secrets.GITHUB_TOKEN)'
    required: true

runs:
  using: 'composite'
  steps:
    - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
      with:
        terraform_version: ${{ inputs.terraform_version }}
        cli_config_credentials_token: ${{ inputs.tf_cloud_token }}

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform init

    - name: Terraform Format Check
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform fmt -check -recursive

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: terraform validate

    - name: Terraform Plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      env:
        TF_VAR_cloudflare_api_token: ${{ inputs.cloudflare_api_token }}
        TF_VAR_cloudflare_account_id: ${{ inputs.cloudflare_account_id }}
        TF_VAR_cloudflare_access_api_token: ${{ inputs.cloudflare_access_api_token }}
      run: terraform plan -no-color -out=tfplan
      continue-on-error: true

    - name: Plan-Output als PR-Comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7.1.0
      env:
        PLAN: "${{ steps.plan.outputs.stdout }}"
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const planOutput = process.env.PLAN || '(no plan output)';
          const maxLen = 60000;
          const truncated = planOutput.length > maxLen
            ? planOutput.slice(0, maxLen) + '\n\n... (truncated)'
            : planOutput;
          const body = `### Terraform Plan 📋\n\n\`\`\`hcl\n${truncated}\n\`\`\``;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body,
          });

    - name: Fail wenn plan errored
      if: steps.plan.outcome == 'failure'
      shell: bash
      run: exit 1
