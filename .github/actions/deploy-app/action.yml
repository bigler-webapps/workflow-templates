name: 'Deploy App'
description: 'Deploys a Django/React app via rsync + Docker Compose over Tailscale SSH (no SSH-key auth path).'

# v1.11.0 — Tailscale-SSH-only. ssh_private_key input removed. Tailscale
# OAuth (ts_oauth_*) is required; the runner joins the tailnet ephemerally
# and uses `tailscale ssh` for all remote operations. Tag-based identity
# replaces key-based auth — auth decisions live in the tailnet ACL
# `ssh:`-section (tag:ci-deploy → tag:server-* as `deploy`).

inputs:
  environment:
    description: 'Target environment (staging or production)'
    required: true
    default: 'staging'
  ssh_host:
    description: 'Tailnet hostname to SSH to. Optional — when empty, derived from project.yaml/environments[env].server + `.tail990d7f.ts.net`.'
    required: false
    default: ''
  ssh_user:
    description: 'Remote SSH user. Default `deploy` (matches biglerconsult.infra.deploy_user role default).'
    required: false
    default: 'deploy'
  ts_oauth_client_id:
    description: 'Tailscale OAuth client ID. Required (v1.11.0+ is Tailscale-SSH-only).'
    required: true
  ts_oauth_secret:
    description: 'Tailscale OAuth client secret.'
    required: true
  ts_tag:
    description: 'Tailnet tag for the ephemeral CI node. Must be allowed in the tailnet ACL and the OAuth client must be authorised for it.'
    required: false
    default: 'tag:ci-deploy'
  secrets_context_json:
    description: 'JSON-serialized secrets context (toJson(secrets)) for generate-env'
    required: true
  provision_file_secrets:
    description: 'Whether optional file secrets should be provisioned on the target server'
    required: false
    default: 'false'
  file_secret_target_subdir:
    description: 'Target subdirectory under REMOTE_PATH for optional file secrets'
    required: false
    default: '.ssh'
  file_secret_1_name:
    description: 'Target filename for optional file secret 1'
    required: false
    default: ''
  file_secret_1_mode:
    description: 'File mode for optional file secret 1'
    required: false
    default: '600'
  file_secret_1_content:
    description: 'Content of optional file secret 1'
    required: false
    default: ''
  file_secret_2_name:
    description: 'Target filename for optional file secret 2'
    required: false
    default: ''
  file_secret_2_mode:
    description: 'File mode for optional file secret 2'
    required: false
    default: '600'
  file_secret_2_content:
    description: 'Content of optional file secret 2'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 🔗 Join Tailnet
      uses: tailscale/github-action@v3   # TODO S33: SHA-pin via Renovate
      with:
        oauth-client-id: ${{ inputs.ts_oauth_client_id }}
        oauth-secret: ${{ inputs.ts_oauth_secret }}
        tags: ${{ inputs.ts_tag }}
        version: latest

    - name: 🔎 Validate inputs
      shell: bash
      env:
        INPUT_TS_OAUTH_CLIENT_ID: ${{ inputs.ts_oauth_client_id }}
        INPUT_TS_OAUTH_SECRET: ${{ inputs.ts_oauth_secret }}
      run: |
        set -euo pipefail
        # `required: true` permits empty values at the workflow level —
        # tailscale/github-action would already have failed if these were
        # empty, but we double-check so a confused future caller that
        # passes empty-string gets a clear deploy-app-level error.
        if [ -z "${INPUT_TS_OAUTH_CLIENT_ID}" ] || [ -z "${INPUT_TS_OAUTH_SECRET}" ]; then
          echo "❌ ts_oauth_client_id and ts_oauth_secret are required for v1.11.0+ (Tailscale-SSH-only)"
          exit 1
        fi
        echo "✅ Tailnet OAuth inputs present."

    - name: 🔎 Validate caller-input strings
      shell: bash
      env:
        INPUT_ENV: ${{ inputs.environment }}
        INPUT_SUBDIR: ${{ inputs.file_secret_target_subdir }}
        INPUT_F1_NAME: ${{ inputs.file_secret_1_name }}
        INPUT_F1_MODE: ${{ inputs.file_secret_1_mode }}
        INPUT_F2_NAME: ${{ inputs.file_secret_2_name }}
        INPUT_F2_MODE: ${{ inputs.file_secret_2_mode }}
        INPUT_SSH_USER: ${{ inputs.ssh_user }}
        INPUT_SSH_HOST: ${{ inputs.ssh_host }}
      run: |
        set -euo pipefail
        printf '%s' "$INPUT_ENV" | grep -qE '^[a-zA-Z0-9_-]+$' || { echo "❌ Invalid environment"; exit 1; }
        printf '%s' "$INPUT_SSH_USER" | grep -qE '^[a-z_][a-z0-9_-]{0,31}$' || { echo "❌ Invalid ssh_user"; exit 1; }
        # ssh_host is optional (derived from project.yaml when empty);
        # only validate format when explicitly provided.
        if [ -n "$INPUT_SSH_HOST" ]; then
          printf '%s' "$INPUT_SSH_HOST" | grep -qE '^[a-zA-Z0-9._:-]+$' || { echo "❌ Invalid ssh_host"; exit 1; }
        fi
        for var_name in INPUT_SUBDIR INPUT_F1_NAME INPUT_F2_NAME; do
          value="${!var_name:-}"
          [ -z "$value" ] && continue
          if printf '%s' "$value" | grep -qE '\.\.|/|[[:space:]]|[;&|`$]'; then
            echo "❌ Invalid $var_name (no path traversal or shell metas)"
            exit 1
          fi
        done
        for var_name in INPUT_F1_MODE INPUT_F2_MODE; do
          value="${!var_name:-}"
          [ -z "$value" ] && continue
          printf '%s' "$value" | grep -qE '^[0-7]{3,4}$' || { echo "❌ Invalid $var_name (octal file mode)"; exit 1; }
        done
        echo "✅ Inputs validated."

    - name: 🐍 Setup Python
      uses: actions/setup-python@b64ffcaf5b410884ad320a9cfac8866006a109aa  # v4.8.0
      with:
        python-version: '3.10'

    - name: 📦 Install tooling
      shell: bash
      run: |
        pip install "django-core-micha>=2.4.0" "PyYAML==6.0.2"

    - name: 🧮 Calculate configuration
      id: config
      shell: bash
      env:
        TARGET_ENV: ${{ inputs.environment }}
        SSH_HOST_INPUT: ${{ inputs.ssh_host }}
      run: |
        python3 - <<'PYCODE'
        import os
        import sys
        import yaml

        target_env = os.environ["TARGET_ENV"]
        ssh_host_input = os.environ.get("SSH_HOST_INPUT", "").strip()

        try:
            with open("project.yaml") as f:
                config = yaml.safe_load(f)
            project_name = config["project_name"]
        except FileNotFoundError:
            print("❌ Error: project.yaml not found!")
            raise SystemExit(1)

        suffix = "_stage" if target_env == "staging" else ""
        remote_path = f"/srv/apps/{project_name}{suffix}"

        # Derive Tailnet hostname from project.yaml when ssh_host input is
        # empty. environments[env].server is the physical host name (e.g.
        # 'main-prod', 'staging'); we add the MagicDNS suffix to get the
        # Tailnet FQDN. When caller explicitly sets ssh_host, that value
        # wins (lets callers override for ad-hoc targets).
        if ssh_host_input:
            resolved_host = ssh_host_input
            host_source = "input.ssh_host"
        else:
            env_cfg = (config.get("environments") or {}).get(target_env) or {}
            server = (env_cfg.get("server") or "").strip()
            if not server:
                print(
                    f"❌ Error: project.yaml has no environments[{target_env}].server "
                    f"and inputs.ssh_host is empty. Provide one or the other."
                )
                raise SystemExit(1)
            resolved_host = f"{server}.tail990d7f.ts.net"
            host_source = f"project.yaml environments[{target_env}].server"

        print(f"✅ Environment:        {target_env}")
        print(f"✅ Project:            {project_name}")
        print(f"✅ Remote Path:        {remote_path}")
        print(f"✅ Resolved SSH host:  {resolved_host}  (source: {host_source})")

        with open(os.environ["GITHUB_ENV"], "a") as f:
            f.write(f"TARGET_ENV={target_env}\n")
            f.write(f"REMOTE_PATH={remote_path}\n")
            f.write(f"PROJECT_NAME={project_name}\n")
            f.write(f"RESOLVED_SSH_HOST={resolved_host}\n")
        PYCODE

    - name: 🔌 Pre-flight Tailscale-SSH connectivity check
      shell: bash
      env:
        TAILNET_HOST: ${{ env.RESOLVED_SSH_HOST }}
        SSH_USER: ${{ inputs.ssh_user }}
      run: |
        set -euo pipefail
        # Fail fast with a clear error before doing the expensive rsync
        # if the tailnet ACL doesn't permit tag:ci-deploy → this host as
        # ${SSH_USER}, or tailscaled isn't running on the target with
        # --ssh, or any other policy/connectivity issue. Avoids ambiguous
        # rsync-style errors and surfaces ACL misconfigurations in
        # seconds instead of minutes.
        echo "→ tailscale ssh ${SSH_USER}@${TAILNET_HOST} 'true'"
        if ! tailscale ssh "${SSH_USER}@${TAILNET_HOST}" true; then
          echo "❌ Tailscale-SSH pre-flight failed."
          echo "   Common causes:"
          echo "   - Tailnet ACL ssh:-section missing rule for tag:ci-deploy → tag:server-* as ${SSH_USER}"
          echo "   - tailscaled on target host not started with --ssh"
          echo "   - target host not joined to tailnet (check ${TAILNET_HOST} resolves)"
          exit 1
        fi
        echo "✅ Tailscale-SSH reachable as ${SSH_USER}@${TAILNET_HOST}"

    - name: 🔐 Generate .env file
      shell: bash
      env:
        SECRETS_CONTEXT_RAW: ${{ inputs.secrets_context_json }}
      run: |
        set -euo pipefail
        # S5/S21 partial mitigation: drop CI-only secret families before
        # generate-env sees them. Reduces blast radius of any crash/debug
        # leak inside the generate-env subprocess; the runtime .env is built
        # only from app-relevant keys anyway (filtered further by generate-env
        # against the app's secrets.yaml).
        SECRETS_CONTEXT=$(
          printf '%s' "$SECRETS_CONTEXT_RAW" \
            | jq -c 'with_entries(select(.key | test("^(SSH_|B2_|RESTIC_|GITHUB_|TS_)") | not))'
        )
        unset SECRETS_CONTEXT_RAW
        export SECRETS_CONTEXT
        echo "Generating .env for env: ${TARGET_ENV}"
        generate-env --env "${TARGET_ENV}"

    - name: 📝 Build rsync → tailscale-ssh wrapper
      shell: bash
      run: |
        set -euo pipefail
        # rsync invokes its `-e` remote-shell tool with ssh-style flags
        # (`-l <user> <host>`, sometimes `-p <port>` / `-i <identity>`).
        # `tailscale ssh` does NOT accept those flags — it expects
        # `tailscale ssh [user@]<host> [args...]`. This wrapper translates
        # rsync's call convention into the tailscale-ssh argv shape:
        #   `wrap -l deploy host rsync --server ...`
        #     → `tailscale ssh deploy@host rsync --server ...`
        # `-p` / `-i` are silently dropped (Tailnet doesn't need them —
        # auth is identity-based, port is fixed by tailscaled).
        cat > /tmp/ts-ssh-rsync <<'WRAP'
        #!/usr/bin/env bash
        set -euo pipefail
        USER_ARG=""
        HOST_ARG=""
        declare -a EXTRA=()
        while [ $# -gt 0 ]; do
          case "$1" in
            -l)    USER_ARG="$2"; shift 2 ;;
            -p|-i) shift 2 ;;  # drop ssh-style port/identity flags rsync may pass
            *)     HOST_ARG="$1"; shift; EXTRA=("$@"); break ;;
          esac
        done
        if [ -n "$USER_ARG" ]; then
          exec tailscale ssh "${USER_ARG}@${HOST_ARG}" "${EXTRA[@]}"
        else
          exec tailscale ssh "${HOST_ARG}" "${EXTRA[@]}"
        fi
        WRAP
        chmod +x /tmp/ts-ssh-rsync
        echo "✅ Wrapper /tmp/ts-ssh-rsync installed."

    - name: 🚀 Rsync project to server (via tailscale ssh)
      shell: bash
      env:
        TAILNET_HOST: ${{ env.RESOLVED_SSH_HOST }}
        SSH_USER: ${{ inputs.ssh_user }}
        REMOTE_PATH: ${{ env.REMOTE_PATH }}
      run: |
        set -euo pipefail
        rsync -rlvz \
          --delete --delete-delay \
          --partial --delay-updates \
          --no-owner --no-group --no-perms --omit-dir-times \
          --chmod=Du=rwx,Dg=rwx,Do=rx,Fu=rw,Fg=rw,Fo=r \
          --rsync-path="mkdir -p ${REMOTE_PATH} && rsync" \
          -e /tmp/ts-ssh-rsync \
          --exclude=certbot/letsencrypt \
          --exclude=docker-compose.override.yml \
          --exclude=.git \
          --exclude=.github \
          --exclude=frontend/node_modules \
          --exclude=frontend/build \
          --exclude=frontend/build_current \
          --exclude=backend/media \
          --exclude='**/__pycache__/' \
          --exclude=*.pyc \
          --exclude='model/.$*.drawio.dtmp' \
          --exclude='model/.$*.drawio.bkp' \
          --exclude=backups \
          ./ "${SSH_USER}@${TAILNET_HOST}:${REMOTE_PATH}"

    - name: 🔐 Provision optional file secrets (via tailscale ssh)
      if: ${{ inputs.provision_file_secrets == 'true' && ((inputs.file_secret_1_content != '' && inputs.file_secret_1_name != '') || (inputs.file_secret_2_content != '' && inputs.file_secret_2_name != '')) }}
      shell: bash
      env:
        TAILNET_HOST: ${{ env.RESOLVED_SSH_HOST }}
        SSH_USER: ${{ inputs.ssh_user }}
        REMOTE_PATH: ${{ env.REMOTE_PATH }}
        TARGET_SUBDIR: ${{ inputs.file_secret_target_subdir }}
        F1_NAME: ${{ inputs.file_secret_1_name }}
        F1_MODE: ${{ inputs.file_secret_1_mode }}
        F1_CONTENT: ${{ inputs.file_secret_1_content }}
        F2_NAME: ${{ inputs.file_secret_2_name }}
        F2_MODE: ${{ inputs.file_secret_2_mode }}
        F2_CONTENT: ${{ inputs.file_secret_2_content }}
      run: |
        set -euo pipefail
        # Encode secret contents to single-line base64 locally — multi-line
        # PEMs and other newline-containing content cannot be safely inlined
        # into a heredoc that the local shell interpolates. Remote `bash`
        # decodes via base64 -d.
        #
        # `base64 | tr -d '\n'` works on both GNU coreutils (Linux runners)
        # and BSD base64 (macOS runners). GNU's `-w0` would also work on
        # Linux but is rejected by BSD base64.
        F1_B64="$(printf '%s' "$F1_CONTENT" | base64 | tr -d '\n')"
        F2_B64="$(printf '%s' "$F2_CONTENT" | base64 | tr -d '\n')"

        # Send a self-contained script over stdin. Local shell interpolates
        # the ${VAR}-references when building the heredoc body; remote-only
        # references use \$VAR so they resolve in the remote bash.
        tailscale ssh "${SSH_USER}@${TAILNET_HOST}" bash <<EOF
        set -euo pipefail

        REMOTE_PATH="${REMOTE_PATH}"
        TARGET_SUBDIR="${TARGET_SUBDIR}"
        F1_NAME="${F1_NAME}"
        F1_MODE="${F1_MODE}"
        F1_B64="${F1_B64}"
        F2_NAME="${F2_NAME}"
        F2_MODE="${F2_MODE}"
        F2_B64="${F2_B64}"

        TARGET_DIR="\${REMOTE_PATH}/\${TARGET_SUBDIR}"
        mkdir -p "\$TARGET_DIR"
        chmod 700 "\$TARGET_DIR"

        if [ -n "\${F1_B64}" ] && [ -n "\${F1_NAME}" ]; then
          printf '%s' "\$F1_B64" | base64 -d | tr -d '\r' > "\$TARGET_DIR/\$F1_NAME"
          chmod "\$F1_MODE" "\$TARGET_DIR/\$F1_NAME"
        fi

        if [ -n "\${F2_B64}" ] && [ -n "\${F2_NAME}" ]; then
          printf '%s' "\$F2_B64" | base64 -d | tr -d '\r' > "\$TARGET_DIR/\$F2_NAME"
          chmod "\$F2_MODE" "\$TARGET_DIR/\$F2_NAME"
        fi
        EOF

    - name: 🐳 Build, restart & migrate (via tailscale ssh)
      shell: bash
      env:
        TAILNET_HOST: ${{ env.RESOLVED_SSH_HOST }}
        SSH_USER: ${{ inputs.ssh_user }}
        REMOTE_PATH: ${{ env.REMOTE_PATH }}
      run: |
        set -euo pipefail
        # Heredoc pattern (same as file-secrets step above):
        #   - The top assignment block injects local runner values into
        #     remote shell variables. `${VAR}` references in those
        #     assignments are interpolated LOCALLY when the heredoc body
        #     is built, before the script is piped to remote bash.
        #   - All subsequent `\$VAR` references are escaped and resolve
        #     REMOTE-side, against the just-assigned remote variables.
        # This split keeps the data/code boundary explicit and audit-clean.
        tailscale ssh "${SSH_USER}@${TAILNET_HOST}" bash <<EOF
        set -euo pipefail

        REMOTE_PATH="${REMOTE_PATH}"

        cd "\$REMOTE_PATH"

        # Server-side serialization: prevent two concurrent docker compose
        # runs for the same project+environment from racing on container
        # names. GitHub Actions concurrency (per-workflow) is the primary
        # guard; this is defense-in-depth for manual triggers or if the
        # workflow guard fails.
        LOCK_NAME="\$(printf '%s' "\$REMOTE_PATH" | sed 's|/|_|g; s|^_||')"
        LOCK_FILE="/tmp/deploy-\${LOCK_NAME}.lock"
        exec 200>"\$LOCK_FILE"
        echo "🔒 Acquiring deploy lock (\${LOCK_FILE})..."
        flock -x 200
        echo "🔒 Lock acquired."

        DOCKER="docker"
        if ! docker info >/dev/null 2>&1; then
          DOCKER="sudo -n docker"
        fi

        export DOCKER_BUILDKIT=1
        COMPOSE_FILES="-f docker-compose.yml"

        echo "🚀 Starting Deployment..."
        \$DOCKER image prune -f

        echo "🔥 Recreating containers..."
        \$DOCKER compose \$COMPOSE_FILES --env-file .env up -d --build --force-recreate --remove-orphans

        echo "⏳ Waiting for backend to initialize..."
        sleep 3

        echo "🔄 Running migrations..."
        \$DOCKER compose \$COMPOSE_FILES --env-file .env exec -T backend python manage.py migrate --noinput

        echo "✅ Deployment finished successfully!"
        EOF
