name: 'Janitor (Docker prune + disk report)'
description: 'Syncs ops scripts to the server and runs janitor.sh. Expects ops-scripts/ in the caller working dir.'

# v2.0.0 — Tailscale-SSH-only. ssh_private_key removed; auth is via
# Tailnet identity (tag:ci-deploy) + tailnet ACL ssh:-section. Transport
# is plain `ssh user@<host>.tail990d7f.ts.net` (no tailscale-ssh wrapper
# needed — Tailscale's SSH listener accepts the Tailnet-identity at the
# WireGuard layer; OpenSSH reports `Authenticated using "none"`).

inputs:
  target:
    description: 'Inventory target name (used for logging)'
    required: true
  ssh_host:
    description: 'Tailnet hostname (e.g. main-prod.tail990d7f.ts.net)'
    required: true
  ssh_user:
    description: 'SSH user on the target host'
    required: true
  ops_scripts_path:
    description: 'Local path containing ops scripts to sync to the server'
    required: false
    default: 'ops-scripts'
  remote_scripts_path:
    description: 'Remote target directory for ops scripts'
    required: false
    default: '/srv/infrastructure/ops-scripts'
  ts_oauth_client_id:
    description: 'Tailscale OAuth client ID. Required (v2.0.0+ is Tailscale-SSH-only).'
    required: true
  ts_oauth_secret:
    description: 'Tailscale OAuth client secret.'
    required: true
  ts_tag:
    description: 'Tailnet tag for the ephemeral CI node. Must be allowed in the tailnet ACL.'
    required: false
    default: 'tag:ci-deploy'

runs:
  using: 'composite'
  steps:
    - name: 🔗 Join Tailnet
      uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade  # v3.2.3
      with:
        oauth-client-id: ${{ inputs.ts_oauth_client_id }}
        oauth-secret: ${{ inputs.ts_oauth_secret }}
        tags: ${{ inputs.ts_tag }}
        version: latest

    - name: 🔎 Validate inputs
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_SSH_USER: ${{ inputs.ssh_user }}
        INPUT_SSH_HOST: ${{ inputs.ssh_host }}
        INPUT_TS_OAUTH_CLIENT_ID: ${{ inputs.ts_oauth_client_id }}
        INPUT_TS_OAUTH_SECRET: ${{ inputs.ts_oauth_secret }}
      run: |
        set -euo pipefail
        if [ -z "$INPUT_TS_OAUTH_CLIENT_ID" ] || [ -z "$INPUT_TS_OAUTH_SECRET" ]; then
          echo "❌ ts_oauth_client_id and ts_oauth_secret are required (v2.0.0+)"
          exit 1
        fi
        printf '%s' "$INPUT_TARGET" | grep -qE '^[a-zA-Z0-9_-]+$' || { echo "❌ Invalid target"; exit 1; }
        printf '%s' "$INPUT_SSH_USER" | grep -qE '^[a-z_][a-z0-9_-]{0,31}$' || { echo "❌ Invalid ssh_user"; exit 1; }
        printf '%s' "$INPUT_SSH_HOST" | grep -qE '^[a-zA-Z0-9._:-]+$' || { echo "❌ Invalid ssh_host"; exit 1; }
        echo "✅ Inputs validated."

    - name: 📂 Sync ops scripts to server
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        OPS_SCRIPTS_PATH: ${{ inputs.ops_scripts_path }}
        REMOTE_SCRIPTS_PATH: ${{ inputs.remote_scripts_path }}
      run: |
        set -euo pipefail
        # `rsync -e ssh` over Tailnet. Auth is Tailnet-identity (server
        # responds Authenticated="none" — Tailscale's SSH listener
        # validated at WireGuard layer). No -i private-key needed.
        rsync -avz -e "ssh -o StrictHostKeyChecking=accept-new" \
          "${OPS_SCRIPTS_PATH}/" \
          "${SSH_USER}@${SSH_HOST}:${REMOTE_SCRIPTS_PATH}/"

    - name: 🧹 Run janitor on server
      shell: bash
      env:
        SSH_HOST: ${{ inputs.ssh_host }}
        SSH_USER: ${{ inputs.ssh_user }}
        REMOTE_SCRIPTS_PATH: ${{ inputs.remote_scripts_path }}
      run: |
        set -euo pipefail
        ssh -o StrictHostKeyChecking=accept-new "${SSH_USER}@${SSH_HOST}" \
          "bash ${REMOTE_SCRIPTS_PATH}/janitor.sh"
