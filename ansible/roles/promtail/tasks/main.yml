---
- name: Deploy Promtail log shipper
  become: true
  block:
    - name: Create Promtail directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0750"
      loop:
        - "{{ promtail_base_dir }}"
        - "{{ promtail_config_dir }}"

    - name: Render Promtail config
      ansible.builtin.template:
        src: promtail-config.yml.j2
        dest: "{{ promtail_config_dir }}/promtail.yml"
        owner: root
        group: root
        mode: "0640"

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ promtail_base_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0640"

    - name: Pull Promtail image
      ansible.builtin.command:
        cmd: docker compose pull --quiet
        chdir: "{{ promtail_base_dir }}"
      changed_when: false

    - name: Start / update Promtail stack
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ promtail_base_dir }}"
      register: _promtail_up
      changed_when: _promtail_up.stderr is search('Started|Recreated|Created')
