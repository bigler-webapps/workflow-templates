---
docker_apt_keyring_dir: /etc/apt/keyrings
docker_apt_keyring_path: /etc/apt/keyrings/docker.asc
docker_apt_repo_url: https://download.docker.com/linux/ubuntu
docker_apt_repo_filename: docker

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_service_enabled: true
docker_service_state: started
