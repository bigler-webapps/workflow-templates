---
- name: Configure fail2ban (requires root)
  become: true
  block:
    - name: Ensure fail2ban is installed
      ansible.builtin.apt:
        name: fail2ban
        state: present

    - name: Render fail2ban jail.local
      ansible.builtin.template:
        src: jail.local.j2
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: "0644"
      notify: Restart fail2ban

    - name: Ensure fail2ban service started and enabled
      ansible.builtin.systemd:
        name: fail2ban
        state: "{{ fail2ban_service_state }}"
        enabled: "{{ fail2ban_service_enabled }}"
