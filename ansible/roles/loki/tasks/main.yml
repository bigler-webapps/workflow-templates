---
- name: Deploy Loki + Grafana (staging log collector)
  become: true
  block:
    # ── Directory structure ──────────────────────────────────────────────────
    # /srv/loki/ must be 0755 (world-traversable) so both the Loki container
    # (UID 10001) and the Grafana container (UID 472) can descend into their
    # respective subdirectories without being blocked by the parent perms.
    - name: Ensure /srv/loki base dir is world-traversable (0755)
      ansible.builtin.file:
        path: "{{ loki_base_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    # Config dir: group = loki_uid so the container reads files via group perms.
    # Owner stays root to prevent the container from modifying the config.
    - name: Ensure Loki config dir is group-readable by Loki container
      ansible.builtin.file:
        path: "{{ loki_config_dir }}"
        state: directory
        owner: root
        group: "{{ loki_uid }}"
        mode: "0750"

    # Data dir: Loki creates chunks/index/compactor/WAL under this path.
    # Full ownership so the container can create sub-directories freely.
    - name: Ensure Loki data dir is owned by Loki container UID
      ansible.builtin.file:
        path: "{{ loki_data_dir }}"
        state: directory
        owner: "{{ loki_uid }}"
        group: "{{ loki_uid }}"
        mode: "0750"

    # Grafana dir hierarchy: all owned by grafana_uid.
    #   datasources               — Loki datasource provisioning config.
    #   plugins/alerting/dashboards — empty; created to silence Grafana
    #                                  "no such file or directory" warnings.
    - name: Ensure Grafana dir hierarchy is owned by Grafana container UID
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ grafana_uid }}"
        group: "{{ grafana_uid }}"
        mode: "0750"
      loop:
        - "{{ loki_base_dir }}/grafana"
        - "{{ loki_base_dir }}/grafana/provisioning"
        - "{{ loki_grafana_provisioning_dir }}"
        - "{{ loki_base_dir }}/grafana/provisioning/plugins"
        - "{{ loki_base_dir }}/grafana/provisioning/alerting"
        - "{{ loki_base_dir }}/grafana/provisioning/dashboards"

    # ── .env file for Grafana admin password (Variante 2) ───────────────────
    # touch with modification_time=preserve: creates the file if absent but
    # does not bump mtime on re-runs, keeping compose env_file stable.
    # Populated by: sync-secrets --server --secret-target staging
    - name: Ensure Grafana env file exists (populated out-of-band by sync-secrets)
      ansible.builtin.file:
        path: "{{ loki_base_dir }}/.env"
        state: touch
        owner: root
        group: root
        mode: "0600"
        modification_time: preserve
        access_time: preserve

    # Writes GF_SECURITY_ADMIN_PASSWORD into /srv/loki/.env when the CI runner
    # exposes it as an env var (injected from the GitHub staging environment by
    # sync-secrets --server --secret-target staging).
    # no_log=true: prevents the secret appearing in Ansible output or logs.
    # Idempotent: lineinfile replaces an existing key on re-runs.
    - name: Write Grafana admin password to /srv/loki/.env (from CI GitHub env)
      ansible.builtin.lineinfile:
        path: "{{ loki_base_dir }}/.env"
        regexp: '^GF_SECURITY_ADMIN_PASSWORD='
        line: "GF_SECURITY_ADMIN_PASSWORD={{ lookup('env', 'GF_SECURITY_ADMIN_PASSWORD') }}"
        create: true
        owner: root
        group: root
        mode: "0600"
      when: lookup('env', 'GF_SECURITY_ADMIN_PASSWORD') | length > 0
      no_log: true

    # ── Config + compose rendering ──────────────────────────────────────────
    # Config: owner=root (immutable), group=loki_uid (readable).
    # mode 0640 → container reads as group member; no world-readable needed.
    - name: Render Loki config
      ansible.builtin.template:
        src: loki-config.yml.j2
        dest: "{{ loki_config_dir }}/loki.yml"
        owner: root
        group: "{{ loki_uid }}"
        mode: "0640"

    - name: Render Grafana Loki datasource provisioning
      ansible.builtin.template:
        src: grafana-datasources.yml.j2
        dest: "{{ loki_grafana_provisioning_dir }}/loki.yml"
        owner: "{{ grafana_uid }}"
        group: "{{ grafana_uid }}"
        mode: "0640"

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ loki_base_dir }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0640"

    # ── Deploy ───────────────────────────────────────────────────────────────
    - name: Pull Loki + Grafana images
      ansible.builtin.command:
        cmd: docker compose pull --quiet
        chdir: "{{ loki_base_dir }}"
      changed_when: false

    - name: Start / update Loki + Grafana stack
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ loki_base_dir }}"
      register: _loki_up
      changed_when: _loki_up.stderr is search('Started|Recreated|Created')
